function parseSqref(s){
  const out = [];
  for (const part of s.trim().split(/\s+/)){
    const [a, b] = part.split(':');
    const r1 = rowNum(a), c1 = colNum(a);
    const r2 = b ? rowNum(b) : r1, c2 = b ? colNum(b) : c1;
    out.push({ r1: Math.min(r1,r2), r2: Math.max(r1,r2), c1: Math.min(c1,c2), c2: Math.max(c1,c2) });
  }
  return out;
}
function dxfCss(dxf, theme){
  const d = [];
  const fill = dxf.getElementsByTagName('fill')[0];
  if (fill){
    const p = fill.getElementsByTagName('patternFill')[0];
    const c = p && (colorOf(p.getElementsByTagName('bgColor')[0], theme) || colorOf(p.getElementsByTagName('fgColor')[0], theme));
    if (c) d.push('background:' + c + '!important');
  }
  const f = dxf.getElementsByTagName('font')[0];
  if (f){
    const c = colorOf(f.getElementsByTagName('color')[0], theme);
    if (c) d.push('color:' + c + '!important');
    if (f.getElementsByTagName('b').length) d.push('font-weight:700');
    if (f.getElementsByTagName('i').length) d.push('font-style:italic');
  }
  return d.join(';');
}
const lerp = (a, b, t) => Math.round(a + (b - a) * t);
function mixHex(h1, h2, t){
  const p = h => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
  const A = p(h1), B = p(h2);
  return '#' + [0,1,2].map(i => pad(lerp(A[i], B[i], t).toString(16))).join('');
}
function cfvoVal(v, vals, min, max){
  const t = v.getAttribute('type'), val = v.getAttribute('val');
  if (t === 'min') return min;
  if (t === 'max') return max;
  if (t === 'percent') return min + (max - min) * (parseFloat(val) / 100);
  if (t === 'percentile'){
    const s = vals.slice().sort((a,b) => a-b);
    const i = (parseFloat(val) / 100) * (s.length - 1);
    return s.length ? s[Math.round(i)] : 0;
  }
  return parseFloat(val);
}
function applyCF(doc, sh, dxfs, theme){
  const cfs = doc.getElementsByTagName('conditionalFormatting');
  if (!cfs.length) return;
  const css = [], idx = new Map();
  const clsOf = s => {
    if (!s) return -1;
    if (!idx.has(s)){ idx.set(s, css.length); css.push(s); }
    return idx.get(s);
  };
  const put = (r, c, s) => {
    const cell = (sh.rows[r] || [])[c];
    if (!cell) return;
    const i = clsOf(s);
    if (i >= 0) cell.cf = i;
  };

  for (const cf of cfs){
    const ranges = parseSqref(cf.getAttribute('sqref') || '');
    const rules = [...cf.getElementsByTagName('cfRule')]
      .sort((a, b) => (+b.getAttribute('priority') || 0) - (+a.getAttribute('priority') || 0));

    const cells = [];
    for (const r of ranges)
      for (let i = r.r1; i <= r.r2; i++)
        for (let c = r.c1; c <= r.c2; c++){
          const cell = (sh.rows[i] || [])[c];
          if (cell) cells.push({ r: i, c, cell });
        }
    const nums = cells.filter(x => x.cell.num).map(x => x.cell.n);
    const mn = nums.length ? Math.min(...nums) : 0, mx = nums.length ? Math.max(...nums) : 0;

    for (const rule of rules){
      const type = rule.getAttribute('type');
      const dx = rule.getAttribute('dxfId');
      const style = dx !== null && dxfs[+dx] !== undefined ? dxfs[+dx] : '';
      const fs = [...rule.getElementsByTagName('formula')].map(f => f.textContent);
      const op = rule.getAttribute('operator');
      const txt = (rule.getAttribute('text') || '').toLowerCase();

      if (type === 'colorScale'){
        const cs = rule.getElementsByTagName('colorScale')[0];
        const vs = [...cs.getElementsByTagName('cfvo')].map(v => cfvoVal(v, nums, mn, mx));
        const cols = [...cs.getElementsByTagName('color')].map(c => colorOf(c, theme) || '#ffffff');
        for (const x of cells){
          if (!x.cell.num) continue;
          const v = x.cell.n;
          let col;
          if (vs.length >= 3){
            col = v <= vs[1]
              ? mixHex(cols[0], cols[1], vs[1] === vs[0] ? 0 : (v - vs[0]) / (vs[1] - vs[0]))
              : mixHex(cols[1], cols[2], vs[2] === vs[1] ? 0 : (v - vs[1]) / (vs[2] - vs[1]));
          } else {
            col = mixHex(cols[0], cols[1], vs[1] === vs[0] ? 0 : (v - vs[0]) / (vs[1] - vs[0]));
          }
          put(x.r, x.c, 'background:' + col + '!important;color:#000!important');
        }
        continue;
      }
      if (type === 'dataBar'){
        const db = rule.getElementsByTagName('dataBar')[0];
        const col = colorOf(db.getElementsByTagName('color')[0], theme) || '#638ec6';
        const lo = Math.min(0, mn), hi = mx;
        for (const x of cells){
          if (!x.cell.num) continue;
          const p = hi === lo ? 0 : Math.max(0, Math.min(1, (x.cell.n - lo) / (hi - lo)));
          const w = (p * 100).toFixed(1) + '%';
          put(x.r, x.c, 'background:linear-gradient(90deg,' + col + '99 ' + w + ',transparent ' + w + ')!important');
        }
        continue;
      }
      if (!style) continue;

      if (type === 'cellIs'){
        const a = parseFloat(fs[0]), b = parseFloat(fs[1]);
        const test = v => {
          if (typeof v !== 'number' || isNaN(a)) return false;
          switch(op){
            case 'greaterThan': return v > a;
            case 'lessThan': return v < a;
            case 'greaterThanOrEqual': return v >= a;
            case 'lessThanOrEqual': return v <= a;
            case 'equal': return v === a;
            case 'notEqual': return v !== a;
            case 'between': return v >= Math.min(a,b) && v <= Math.max(a,b);
            case 'notBetween': return v < Math.min(a,b) || v > Math.max(a,b);
          }
          return false;
        };
        for (const x of cells) if (x.cell.num && test(x.cell.n)) put(x.r, x.c, style);
      }
      else if (type === 'containsText' || type === 'notContainsText' || type === 'beginsWith' || type === 'endsWith'){
        for (const x of cells){
          const v = String(x.cell.v).toLowerCase();
          const ok = type === 'containsText' ? v.includes(txt)
            : type === 'notContainsText' ? !v.includes(txt)
            : type === 'beginsWith' ? v.startsWith(txt) : v.endsWith(txt);
          if (ok) put(x.r, x.c, style);
        }
      }
      else if (type === 'top10'){
        const n = +(rule.getAttribute('rank') || 10);
        const bottom = /1|true/.test(rule.getAttribute('bottom') || '');
        const pct = /1|true/.test(rule.getAttribute('percent') || '');
        const sorted = nums.slice().sort((a, b) => bottom ? a - b : b - a);
        const k = pct ? Math.ceil(sorted.length * n / 100) : n;
        const cut = sorted[Math.min(k, sorted.length) - 1];
        if (cut !== undefined)
          for (const x of cells)
            if (x.cell.num && (bottom ? x.cell.n <= cut : x.cell.n >= cut)) put(x.r, x.c, style);
      }
      else if (type === 'aboveAverage'){
        const avg = nums.reduce((a, b) => a + b, 0) / (nums.length || 1);
        const below = /1|true/.test(rule.getAttribute('aboveAverage') || 'true') === false;
        for (const x of cells)
          if (x.cell.num && (below ? x.cell.n < avg : x.cell.n > avg)) put(x.r, x.c, style);
      }
      else if (type === 'duplicateValues' || type === 'uniqueValues'){
        const cnt = new Map();
        for (const x of cells) cnt.set(x.cell.v, (cnt.get(x.cell.v) || 0) + 1);
        for (const x of cells){
          const dup = cnt.get(x.cell.v) > 1;
          if (type === 'duplicateValues' ? dup : !dup) put(x.r, x.c, style);
        }
      }
    }
  }
  sh.cfCss = css;
}

/* ==========================================================================
   .xls (CFB + BIFF8)
   ========================================================================== */
function cfbStreams(buf){
  const dv = new DataView(buf), u8 = new Uint8Array(buf);
  if (dv.getUint32(0, true) !== 0xE011CFD0) throw new Error('CFB 형식 아님');
  const ssz = 1 << dv.getUint16(30, true);       // sector size
  const msz = 1 << dv.getUint16(32, true);       // mini sector size
  const nFat = dv.getUint32(44, true);
  const dirStart = dv.getUint32(48, true);
  const miniCut = dv.getUint32(56, true);
  const miniFatStart = dv.getUint32(60, true);
  const difStart = dv.getUint32(68, true);
  const nDif = dv.getUint32(72, true);
  const off = s => 512 + s * ssz;

  // DIFAT → FAT 섹터 목록
  const fatSecs = [];
  for (let i = 0; i < 109 && i < nFat; i++) fatSecs.push(dv.getUint32(76 + i * 4, true));
  let d = difStart;
  for (let n = 0; n < nDif && d !== 0xFFFFFFFE && d !== 0xFFFFFFFF; n++){
    const base = off(d);
    const cnt = (ssz / 4) - 1;
    for (let i = 0; i < cnt && fatSecs.length < nFat; i++) fatSecs.push(dv.getUint32(base + i * 4, true));
    d = dv.getUint32(base + cnt * 4, true);
  }
  const FAT = new Uint32Array(fatSecs.length * (ssz / 4));
  fatSecs.forEach((s, i) => {
    const b = off(s);
    for (let j = 0; j < ssz / 4; j++) FAT[i * (ssz / 4) + j] = dv.getUint32(b + j * 4, true);
  });

  const chain = (start, fat) => {
    const out = [];
    let s = start, guard = 0;
    while (s !== 0xFFFFFFFE && s < fat.length && guard++ < 1e6){ out.push(s); s = fat[s]; }
    return out;
  };
  const readFat = (start, size) => {
    const secs = chain(start, FAT);
    const b = new Uint8Array(secs.length * ssz);
    secs.forEach((s, i) => b.set(u8.subarray(off(s), off(s) + ssz), i * ssz));
    return size ? b.subarray(0, size) : b;
  };

  // 디렉터리
  const dirBuf = readFat(dirStart);
  const entries = [];
  for (let p = 0; p + 128 <= dirBuf.length; p += 128){
    const nl = dirBuf[p + 64] | (dirBuf[p + 65] << 8);
    if (!nl) continue;
    let name = '';
    for (let i = 0; i < nl - 2; i += 2) name += String.fromCharCode(dirBuf[p + i] | (dirBuf[p + i + 1] << 8));
    const ddv = new DataView(dirBuf.buffer, dirBuf.byteOffset + p, 128);
    entries.push({ name, type: dirBuf[p + 66], start: ddv.getUint32(116, true), size: ddv.getUint32(120, true) });
  }

  // 미니 스트림
  const root = entries.find(e => e.type === 5);
  const miniStream = root && root.size ? readFat(root.start, root.size) : new Uint8Array(0);
  const mfBuf = readFat(miniFatStart);
  const MFAT = new Uint32Array(mfBuf.buffer, mfBuf.byteOffset, Math.floor(mfBuf.length / 4));

  return name => {
    const e = entries.find(x => x.name === name && x.type === 2);
    if (!e) return null;
    if (e.size >= miniCut) return readFat(e.start, e.size);
    const secs = chain(e.start, MFAT);
    const b = new Uint8Array(secs.length * msz);
    secs.forEach((s, i) => b.set(miniStream.subarray(s * msz, s * msz + msz), i * msz));
    return b.subarray(0, e.size);
  };
}

function biffStr(dv, p, wide16){
  // XLUnicodeString (BIFF8): cch(2B or 1B) + flags(1B) + chars
  const cch = wide16 ? dv.getUint16(p, true) : dv.getUint8(p);
  let q = p + (wide16 ? 2 : 1);
  const flags = dv.getUint8(q++); const hi = flags & 1;
  let s = '';
  for (let i = 0; i < cch; i++){
    s += String.fromCharCode(hi ? dv.getUint16(q + i * 2, true) : dv.getUint8(q + i));
  }
  return { s, end: q + cch * (hi ? 2 : 1) };
}
function rkNum(v){
  let d;
  if (v & 2) d = (v >> 2);
  else {
    const b = new DataView(new ArrayBuffer(8));
    b.setUint32(0, v & 0xFFFFFFFC, false);
    d = b.getFloat64(0, false);
  }
  return (v & 1) ? d / 100 : d;
}

function parseXls(buf){
  const get = cfbStreams(buf);
  const wbBuf = get('Workbook') || get('Book');
  if (!wbBuf) throw new Error('Workbook 스트림을 찾지 못했습니다.');
  const dv = new DataView(wbBuf.buffer, wbBuf.byteOffset, wbBuf.length);

  // 레코드 스캔
  const recs = [];
  for (let p = 0; p + 4 <= wbBuf.length;){
    const id = dv.getUint16(p, true), len = dv.getUint16(p + 2, true);
    recs.push({ id, p: p + 4, len });
    p += 4 + len;
  }

  // BIFF 버전 확인
  const bof = recs.find(r => r.id === 0x0809);
  if (!bof) throw new Error('BIFF8(.xls 97-2003) 형식이 아닙니다.');

  // SST — 레코드 경계(CONTINUE)를 가로지르는 문자열/리치텍스트 안전 처리
  const sst = [];
  const si = recs.findIndex(r => r.id === 0x00FC);
  if (si >= 0){
    let ri = si, p = recs[si].p + 8, end = recs[si].p + recs[si].len;
    const total = dv.getUint32(recs[si].p + 4, true);

    const adv = () => {                       // 다음 CONTINUE 로 이동
      ri++;
      if (ri >= recs.length || recs[ri].id !== 0x003C) return false;
      p = recs[ri].p; end = recs[ri].p + recs[ri].len;
      return true;
    };
    const room = n => (end - p >= n) || adv();          // 헤더 필드용
    const skip = n => {                                 // 경계를 넘는 바이트 건너뛰기
      while (n > 0){
        const a2 = end - p;
        if (a2 <= 0){ if (!adv()) return false; continue; }
        const k = Math.min(n, a2);
        p += k; n -= k;
      }
      return true;
    };

    for (let n = 0; n < total; n++){
      if (!room(3)) break;
      const cch = dv.getUint16(p, true); p += 2;
      const flags = dv.getUint8(p++);
      let hi = flags & 1;
      const rich = flags & 8, ext = flags & 4;
      let nRun = 0, cbExt = 0;
      if (rich){ if (!room(2)) break; nRun = dv.getUint16(p, true); p += 2; }
      if (ext){ if (!room(4)) break; cbExt = dv.getUint32(p, true); p += 4; }

      let s2 = '';
      for (let i = 0; i < cch; i++){
        if (p >= end){
          if (!adv()) break;
          hi = dv.getUint8(p++) & 1;        // 경계마다 flags 1바이트가 다시 등장
        }
        if (hi){
          if (end - p < 2){ if (!adv()) break; hi = dv.getUint8(p++) & 1; }
          s2 += String.fromCharCode(dv.getUint16(p, true)); p += 2;
        } else {
          s2 += String.fromCharCode(dv.getUint8(p)); p += 1;
        }
      }
      if (!skip(nRun * 4 + cbExt)) { sst.push(s2); break; }   // 런/확장 데이터는 경계 넘어도 flags 없음
      sst.push(s2);
    }
  }

  // 전역: FORMAT / XF / FONT / DATEMODE
  const fmtCodes = {};
  const fonts = [];
  const xfs = [];
  let d1904 = false;
  for (const r of recs){
    if (r.id === 0x041E){
      const id = dv.getUint16(r.p, true);
      fmtCodes[id] = biffStr(dv, r.p + 2, true).s;
    } else if (r.id === 0x0031){
      const grbit = dv.getUint16(r.p + 2, true);
      fonts.push({ b: dv.getUint16(r.p + 6, true) >= 600 || !!(grbit & 1), i: !!(grbit & 2), u: false, st: !!(grbit & 8), color: null, size: dv.getUint16(r.p, true) / 20 });
    } else if (r.id === 0x00E0){
      const ifnt = dv.getUint16(r.p, true);
      const ifmt = dv.getUint16(r.p + 2, true);
      const al = dv.getUint8(r.p + 6);
      const HA = ['general','left','center','right','fill','justify','center','distributed'];
      xfs.push({ ifnt, ifmt, ha: HA[al & 7], wrap: !!(al & 8), va: ['top','middle','bottom','justify'][(al >> 4) & 3] });
    } else if (r.id === 0x0022){
      d1904 = dv.getUint16(r.p, true) === 1;
    }
  }
  // FONT 인덱스 보정 (BIFF는 인덱스 4가 없음)
  const fontAt = i => fonts[i > 4 ? i - 1 : i] || {};
  const styles = xfs.map(x => {
    const code = fmtCodes[x.ifmt] !== undefined ? fmtCodes[x.ifmt] : (BUILTIN[x.ifmt] || 'General');
    return {
      fmt: makeFmt(code, d1904), text: code === '@',
      bg: null, bd: null, font: fontAt(x.ifnt),
      ha: x.ha === 'general' ? null : x.ha, va: x.va, wrap: x.wrap
    };
  });

  // 시트 목록
  const sheets = [];
  for (const r of recs){
    if (r.id !== 0x0085) continue;
    const pos = dv.getUint32(r.p, true);
    const hidden = (dv.getUint8(r.p + 4) & 3) !== 0;
    const name = biffStr(dv, r.p + 6, false).s;
    sheets.push({ name, pos, hidden, styles, loaded: false });
  }

  // 각 시트 파싱
  for (const sh of sheets){
    sh.load = async () => {
      if (sh.loaded) return sh;
      const start = recs.findIndex(r => r.p - 4 === sh.pos);
      const rows = [], merges = [], widths = [];
      let maxC = 0;
      const set = (rw, cl, v, n, xf) => {
        if (v === '' || v === undefined) return;
        if (!rows[rw]) rows[rw] = [];
        rows[rw][cl] = { v, n, num: n !== null, s: xf, red: false };
        if (cl > maxC) maxC = cl;
      };
      const conv = (n, xf) => {
        const st = styles[xf];
        const f = st && st.fmt ? st.fmt(n) : general(n);
        return f;
      };

      for (let i = start + 1; i < recs.length; i++){
        const r = recs[i];
        if (r.id === 0x000A) break;                     // EOF
        const P = r.p;
        switch (r.id){
          case 0x00FD: {                                // LABELSST
            const rw = dv.getUint16(P, true), cl = dv.getUint16(P + 2, true);
            set(rw, cl, sst[dv.getUint32(P + 6, true)] || '', null, dv.getUint16(P + 4, true));
            break;
          }
          case 0x0204: {                                // LABEL
            const rw = dv.getUint16(P, true), cl = dv.getUint16(P + 2, true);
            set(rw, cl, biffStr(dv, P + 6, true).s, null, dv.getUint16(P + 4, true));
            break;
          }
          case 0x0203: {                                // NUMBER
            const rw = dv.getUint16(P, true), cl = dv.getUint16(P + 2, true), xf = dv.getUint16(P + 4, true);
            const n = dv.getFloat64(P + 6, true);
            const f = conv(n, xf);
            set(rw, cl, f.text, n, xf);
            if (f.red && rows[rw][cl]) rows[rw][cl].red = true;
            break;
          }
          case 0x027E: {                                // RK
            const rw = dv.getUint16(P, true), cl = dv.getUint16(P + 2, true), xf = dv.getUint16(P + 4, true);
            const n = rkNum(dv.getUint32(P + 6, true));
            const f = conv(n, xf);
            set(rw, cl, f.text, n, xf);
            if (f.red && rows[rw][cl]) rows[rw][cl].red = true;
            break;
          }
          case 0x00BD: {                                // MULRK
            const rw = dv.getUint16(P, true), c0 = dv.getUint16(P + 2, true);
            const cnt = (r.len - 6) / 6;
            for (let k = 0; k < cnt; k++){
              const xf = dv.getUint16(P + 4 + k * 6, true);
              const n = rkNum(dv.getUint32(P + 6 + k * 6, true));
              const f = conv(n, xf);
              set(rw, c0 + k, f.text, n, xf);
              if (f.red && rows[rw][c0 + k]) rows[rw][c0 + k].red = true;
            }
            break;
          }
          case 0x0006: {                                // FORMULA (캐시된 결과)
            const rw = dv.getUint16(P, true), cl = dv.getUint16(P + 2, true), xf = dv.getUint16(P + 4, true);
            if (dv.getUint16(P + 12, true) === 0xFFFF){
              const t = dv.getUint8(P + 6);
              if (t === 1) set(rw, cl, dv.getUint8(P + 8) ? 'TRUE' : 'FALSE', null, xf);
              else if (t === 2) set(rw, cl, '#ERR', null, xf);
              else if (t === 0){                        // 다음 STRING 레코드
                const nx = recs[i + 1];
                if (nx && nx.id === 0x0207) set(rw, cl, biffStr(dv, nx.p, true).s, null, xf);
              }
            } else {
              const n = dv.getFloat64(P + 6, true);
              const f = conv(n, xf);
              set(rw, cl, f.text, n, xf);
              if (f.red && rows[rw][cl]) rows[rw][cl].red = true;
            }
            break;
          }
          case 0x00E5: {                                // MERGECELLS
            const cnt = dv.getUint16(P, true);
            for (let k = 0; k < cnt; k++){
              const b = P + 2 + k * 8;
              merges.push({
                r1: dv.getUint16(b, true), r2: dv.getUint16(b + 2, true),
                c1: dv.getUint16(b + 4, true), c2: dv.getUint16(b + 6, true)
              });
            }
            break;
          }
          case 0x007D: {                                // COLINFO
            const c1 = dv.getUint16(P, true), c2 = dv.getUint16(P + 2, true);
            const w = dv.getUint16(P + 4, true) / 256;
            for (let c = c1; c <= c2 && c < 2000; c++) widths[c] = Math.max(36, Math.min(520, Math.round(w * 7.2)));
            break;
          }
        }
      }
      Object.assign(sh, {
        rows, maxC, merges, widths, links: {}, freeze: {}, hideC: new Set(), hideR: new Set(),
        cfCss: [], loaded: true, sortable: !merges.length
      });
      return sh;
    };
  }
  return sheets;
}

/* ---------------- 상태 ---------------- */
const CHUNK = 2000;
let FILES = [], FI = 0, SHEETS = [], CUR = null, SHOWN = 0;
let HITS = [], HI = -1, SORT = null, SEL = null, ANCH = null, DRAG = false;

/* ---------------- 스타일 → CSS 클래스 ---------------- */
function styleCSS(sh){
  if (sh._css !== undefined) return sh._css;
  const used = sh.used || new Set();
  const out = [];
  for (const i of used){
    const s = sh.styles[i];
    if (!s) continue;
    const d = [];
    if (s.bg) d.push('background:' + s.bg + '!important');
    if (s.font.color) d.push('color:' + s.font.color);
    if (s.font.b) d.push('font-weight:700');
    if (s.font.i) d.push('font-style:italic');
    if (s.font.u || s.font.st) d.push('text-decoration:' + [s.font.u && 'underline', s.font.st && 'line-through'].filter(Boolean).join(' '));
    if (s.font.size && s.font.size !== 11) d.push('font-size:' + (s.font.size * 1.18).toFixed(1) + 'px');
    if (s.ha) d.push('text-align:' + (s.ha === 'general' ? 'left' : s.ha));
    if (s.va) d.push('vertical-align:' + (s.va === 'center' ? 'middle' : s.va));
    if (s.wrap) d.push('white-space:pre-wrap');
    if (s.bd){
      if (s.bd.t) d.push('border-top:' + s.bd.t);
      if (s.bd.r) d.push('border-right:' + s.bd.r);
      if (s.bd.b) d.push('border-bottom:' + s.bd.b);
      if (s.bd.l) d.push('border-left:' + s.bd.l);
    }
    if (d.length) out.push('#grid.fmt td.s' + i + '{' + d.join(';') + '}');
  }
  (sh.cfCss || []).forEach((c, i) => out.push('#grid.fmt td.cf' + i + '{' + c + '}'));
  out.push('#grid.fmt td.red{color:#c00!important}');
  return (sh._css = out.join('\n'));
}

/* ---------------- 렌더 ---------------- */
function hasHeader(sh){
  // 1행이 전부 텍스트이고, 2~6행에 숫자가 있으면 헤더로 판단
  const r0 = sh.rows[0] || [];
  const t0 = r0.filter(Boolean);
  if (!t0.length || t0.some(c => c.num)) return false;
  for (let i = 1; i < Math.min(6, sh.rows.length); i++)
    if ((sh.rows[i] || []).some(c => c && c.num)) return true;
  return false;
}
function ensureWidths(sh){
  if (sh._wOK) return;
  const nCol = sh.maxC + 1;
  const N = Math.min(sh.rows.length, 400);          // 상위 400행 표본
  for (let c = 0; c < nCol; c++){
    if (sh.widths[c]) continue;
    let w = 3;                                       // 헤더(A, AB) 최소치
    for (let r = 0; r < N; r++){
      const cell = (sh.rows[r] || [])[c];
      if (!cell) continue;
      const t = cell.v;
      let n = 0;
      for (let i = 0; i < t.length; i++) n += t.charCodeAt(i) > 0x2000 ? 1.85 : 1;
      if (n > w) w = n;
      if (w > 46) break;
    }
    sh.widths[c] = Math.max(48, Math.min(300, Math.round(w * 7.4) + 18));
  }
  sh._wOK = true;
}
function seq(n){ const a = new Array(n); for (let i = 0; i < n; i++) a[i] = i; return a; }
function order(sh){
  if (!SORT) return seq(sh.rows.length);
  const { c, dir, head } = SORT;
  const idx = seq(sh.rows.length);
  const body = idx.slice(head);
  body.sort((a, b) => {
    const x = (sh.rows[a] || [])[c], y = (sh.rows[b] || [])[c];
    const xv = x ? (x.num ? x.n : x.v) : null, yv = y ? (y.num ? y.n : y.v) : null;
    if (xv === null && yv === null) return 0;
    if (xv === null) return 1;
    if (yv === null) return -1;
    const r = typeof xv === 'number' && typeof yv === 'number' ? xv - yv : COLL.compare(String(xv), String(yv));
    return dir * r;
  });
  return idx.slice(0, head).concat(body);
}

function buildMerge(sh){
  const cover = new Map(), skip = new Set();
  for (const m of sh.merges){
    const cs = [], rws = [];
    for (let c = m.c1; c <= m.c2; c++) if (!sh.hideC.has(c)) cs.push(c);
    for (let r = m.r1; r <= m.r2; r++) if (!sh.hideR.has(r)) rws.push(r);
    if (!cs.length || !rws.length) continue;
    const ar = rws[0], ac = cs[0];
    cover.set(ar + ':' + ac, { rs: rws.length, cs: cs.length, sr: m.r1, sc: m.c1 });
    for (const r of rws) for (const c of cs) if (r !== ar || c !== ac) skip.add(r + ':' + c);
  }
  sh._mg = { cover, skip, on: cover.size > 0 };
}
function renderRows(sh, ord, from, to){
  const { cover, skip, on } = sh._mg;
  const cols = sh._cols, fz = sh.freeze || {}, out = [];
  const hasLink = sh.links && Object.keys(sh.links).length > 0;
  const hideR = sh.hideR, rows = sh.rows;
  const fzx = (!SORT && fz.x) ? fz.x : 0;
  for (let i = from; i < to; i++){
    const r = ord[i];
    if (hideR.has(r)) continue;
    const row = rows[r];
    out.push('<tr data-i="', i, '" data-r="', r, '"><th data-hr="', r, '">', r + 1, '</th>');
    for (let j = 0; j < cols.length; j++){
      const c = cols[j];
      let sp = null;
      if (on){
        const k = r + ':' + c;
        if (skip.has(k)) continue;
        sp = cover.get(k);
      }
      const cell = sp ? (rows[sp.sr] || [])[sp.sc] : (row ? row[c] : undefined);
      let cls = 'cell';
      if (cell){
        if (cell.num) cls += ' num';
        if (cell.s >= 0) cls += ' s' + cell.s;
        if (cell.cf !== undefined) cls += ' cf' + cell.cf;
        if (cell.red) cls += ' red';
      }
      if (c < fzx) cls += ' fz fzx' + c;
      let inner = cell ? esc(cell.v) : '';
      if (hasLink && inner){
        const url = sh.links[colName(c) + (r + 1)];
        if (url) inner = '<a href="' + esc(url) + '" target="_blank" rel="noopener">' + inner + '</a>';
      }
      out.push('<td class="', cls, '" data-r="', r, '" data-c="', c, '"',
        sp && sp.rs > 1 ? ' rowspan="' + sp.rs + '"' : '',
        sp && sp.cs > 1 ? ' colspan="' + sp.cs + '"' : '',
        '>', inner, '</td>');
    }
    out.push('</tr>');
  }
  return out.join('');
}

function render(sh){
  const nCol = sh.maxC + 1;
  ensureWidths(sh);
  const cols = [];
  for (let c = 0; c < nCol; c++) if (!sh.hideC.has(c)) cols.push(c);
  sh._cols = cols;

  buildMerge(sh);
  const ord = order(sh);
  sh._ord = ord;
  sh._vis = ord.filter(r => !sh.hideR.has(r));
  SHOWN = Math.min(ord.length, CHUNK);

  let total = 46;
  const cg = ['<colgroup><col style="width:46px">'];
  for (const c of cols){
    const w = sh.widths[c];
    total += w;
    cg.push('<col style="width:' + w + 'px">');
  }
  cg.push('</colgroup>');

  const gap = new Set();
  for (const c of sh.hideC) if (!sh.hideC.has(c + 1)) gap.add(c + 1);

  const hd = ['<thead><tr><th></th>'];
  for (const c of cols){
    const ar = SORT && SORT.c === c ? '<span class="ar">' + (SORT.dir > 0 ? '▲' : '▼') + '</span>' : '';
    hd.push('<th data-c="' + c + '"' + (gap.has(c) ? ' style="border-left:2px solid var(--accent)"' : '')
      + ' title="클릭: 정렬 · 우클릭: 숨기기">' + colName(c) + ar
      + '<span class="rz" data-rz="' + c + '"></span></th>');
  }
  hd.push('</tr></thead>');

  $('grid').innerHTML = '<style id="hid"></style><style id="fzs"></style><style id="sty">'
    + (sh.styles.length || (sh.cfCss || []).length ? styleCSS(sh) : '') + '</style>'
    + '<table style="table-layout:fixed;width:' + total + 'px">' + cg.join('') + hd.join('')
    + '<tbody>' + renderRows(sh, ord, 0, SHOWN) + '</tbody></table>'
    + (SHOWN < ord.length ? '<button id="more"></button>' : '');

  updMore();
  freeze(sh);
  hideBtn();
  const hid = sh.hideR.size + sh.hideC.size;
  $('cap').textContent = ord.length.toLocaleString() + '행 × ' + nCol + '열'
    + (hid ? ' · 숨김 ' + sh.hideR.size + '행/' + sh.hideC.size + '열' : '');
  $('q').value = ''; HITS = []; HI = -1; $('qn').textContent = '';
  PAINTED = []; ROWEL = new Map(); indexRows(null);
  SEL = null; ANCH = null; stat();
  $('grid').scrollTop = 0;
}

/* ---------------- 행/열 숨기기 ---------------- */
function hideBtn(){
  const n = (CUR.hideC ? CUR.hideC.size : 0) + (CUR.hideR ? CUR.hideR.size : 0);
  $('unhide').disabled = !n;
  $('unhide').textContent = n ? '숨김 해제 (' + n + ')' : '숨김 해제';
  $('unhide').classList.toggle('on', !!n);
}
function applyHide(){
  const g = $('grid'), st = g.scrollTop, sl = g.scrollLeft, q = $('q').value;
  render(CUR);
  g.scrollTop = st; g.scrollLeft = sl;
  if (q){ $('q').value = q; search(); }
}
function hideSel(){
  if (!CUR) return;
  const r = selRange();
  if (!r){ $('cellval').textContent = '숨길 행/열을 먼저 선택하세요 (헤더 우클릭도 가능)'; return; }
  const nc = r.c2 - r.c1 + 1, nr = r.r2 - r.r1 + 1;
  if (nc >= nr) for (let c = r.c1; c <= r.c2; c++) CUR.hideC.add(c);
  else for (let i = r.r1; i <= r.r2; i++) CUR.hideR.add(i);
  applyHide();
}

function freeze(sh){
  const fz = sh.freeze || {};
  if (SORT || (!fz.x && !fz.y)) return;
  const tb = $('grid').querySelector('tbody');
  if (!tb) return;
  if (fz.y){
    const hh = $('grid').querySelector('thead th').getBoundingClientRect().height;
    let top = hh, done = 0;
    for (let i = 0; i < tb.rows.length && done < fz.y; i++){
      const tr = tb.rows[i];
      if (+tr.dataset.r >= fz.y) break;
      for (const cell of tr.cells){
        cell.classList.add('fz');
        cell.style.top = top + 'px';
        cell.style.zIndex = cell.tagName === 'TH' ? 5 : 3;
        if (!cell.style.background) cell.style.background = 'var(--head)';
      }
      top += tr.getBoundingClientRect().height;
      done++;
    }
  }
  if (fz.x){
    let left = 46, css = '';
    for (let c = 0; c < fz.x; c++){
      if (sh.hideC.has(c)) continue;
      css += '#grid td.fzx' + c + '{left:' + left + 'px;background:var(--head)}\n';
      left += sh.widths[c];
    }
    const el = document.getElementById('fzs');
    if (el) el.textContent = css;
  }
}

function updMore(){
  const b = $('more');
  if (!b) return;
  const rest = CUR._ord.length - SHOWN;
  b.textContent = '다음 ' + Math.min(CHUNK, rest).toLocaleString() + '행 표시 (남은 ' + rest.toLocaleString() + '행)';
  b.onclick = loadMore;
}
function loadMore(){
  const b = $('more');
  if (!b) return;
  const to = Math.min(CUR._ord.length, SHOWN + CHUNK);
  const tb0 = $('grid').querySelector('tbody');
  const lastBefore = tb0.lastElementChild;
  tb0.insertAdjacentHTML('beforeend', renderRows(CUR, CUR._ord, SHOWN, to));
  SHOWN = to;
  indexRows(lastBefore ? lastBefore.nextElementSibling : null);
  if (SHOWN >= CUR._ord.length) b.remove(); else updMore();
  const q = $('q').value.trim().toLowerCase();
  if (q){ const n = HI; markHits(q); HI = Math.min(n, HITS.length - 1); }
}

/* ---------------- 탭 ---------------- */
function drawTabs(){
  const fb = $('files');
  fb.innerHTML = '';
  fb.style.display = FILES.length > 1 ? 'flex' : 'none';
  FILES.forEach((f, i) => {
    const b = document.createElement('button');
    b.textContent = f.name;
    b.className = i === FI ? 'on' : '';
    b.onclick = () => pickFile(i);
    fb.appendChild(b);
  });
  const tb = $('tabs');
  tb.innerHTML = '';
  tb.style.display = SHEETS.length > 1 ? 'flex' : 'none';
  SHEETS.forEach(sh => {
    const b = document.createElement('button');
    b.textContent = sh.name;
    b.className = (sh === CUR ? 'on ' : '') + (sh.hidden ? 'hid' : '');
    if (sh.hidden) b.title = '숨김 시트';
    b.onclick = async () => { SORT = null; CUR = await sh.load(); drawTabs(); render(CUR); };
    tb.appendChild(b);
  });
}
async function pickFile(i){
  FI = i;
  const f = FILES[i];
  SHEETS = f.sheets;
  SORT = null;
  CUR = await (SHEETS.find(s => !s.hidden) || SHEETS[0]).load();
  $('meta').textContent = f.label;
  drawTabs(); render(CUR);
}

/* ---------------- 선택 / 통계 ---------------- */
function selRange(){
  if (!SEL) return null;
  return {
    r1: Math.min(SEL.r1, SEL.r2), r2: Math.max(SEL.r1, SEL.r2),
    c1: Math.min(SEL.c1, SEL.c2), c2: Math.max(SEL.c1, SEL.c2)
  };
}
let PAINTED = [], ROWEL = new Map();
function indexRows(startEl){
  // 새로 추가된 행만 형제 순회로 인덱싱 (전체 재조회 없음)
  let tr = startEl;
  if (!tr){
    const tb = $('grid').querySelector('tbody');
    if (!tb) return;
    tr = tb.firstElementChild;
  }
  for (; tr; tr = tr.nextElementSibling) ROWEL.set(+tr.dataset.r, tr);
}
function paint(){
  for (const td of PAINTED) td.classList.remove('rng');
  PAINTED.length = 0;
  const r = selRange();
  if (!r) return;
  // 선택 범위의 행만 직접 조회
  for (let rr = r.r1; rr <= r.r2; rr++){
    const tr = ROWEL.get(rr);
    if (!tr) continue;
    const tds = tr.children;
    for (let k = 0, L = tds.length; k < L; k++){
      const td = tds[k];
      if (td.tagName !== 'TD') continue;
      const cc = +td.dataset.c;
      if (cc >= r.c1 && cc <= r.c2){ td.classList.add('rng'); PAINTED.push(td); }
    }
  }
}
function stat(){
  const r = selRange();
  if (!r || (r.r1 === r.r2 && r.c1 === r.c2)){ $('stat').textContent = ''; return; }
  let n = 0, cnt = 0, sum = 0, mn = Infinity, mx = -Infinity;
  const R2 = Math.min(r.r2, r.r1 + 200000);
  for (let i = r.r1; i <= R2; i++){
    if (CUR.hideR.has(i)) continue;
    const row = CUR.rows[i];
    if (!row) continue;
    for (let c = r.c1; c <= r.c2; c++){
      if (CUR.hideC.has(c)) continue;
      const cell = row[c];
      if (!cell) continue;
      cnt++;
      if (cell.num){ n++; sum += cell.n; mn = Math.min(mn, cell.n); mx = Math.max(mx, cell.n); }
    }
  }
  const fx = v => nf.format(+v.toFixed(6));
  $('stat').innerHTML = n
    ? '개수 <b>' + cnt + '</b> · 숫자 <b>' + n + '</b> · 합계 <b>' + fx(sum) + '</b> · 평균 <b>' + fx(sum / n) + '</b> · 최소 <b>' + fx(mn) + '</b> · 최대 <b>' + fx(mx) + '</b>'
    : '개수 <b>' + cnt + '</b>';
}
function showCell(td){
  $('addr').textContent = td.dataset.c !== undefined ? addrOf(td) : '—';
  $('cellval').textContent = td.textContent;
}

/* ---------------- 열기 ---------------- */
async function openFiles(list){
  $('err').hidden = true;
  for (const file of list){
    try{
      const buf = await file.arrayBuffer();
      const u8 = new Uint8Array(buf);
      let sheets, note = '';
      if (u8[0] === 0x50 && u8[1] === 0x4b){
        sheets = await parseXlsx(buf);
        if (!sheets.length) throw new Error('시트를 찾지 못했습니다.');
      } else if (u8[0] === 0xD0 && u8[1] === 0xCF && u8[2] === 0x11 && u8[3] === 0xE0){
        sheets = parseXls(buf);
        if (!sheets.length) throw new Error('시트를 찾지 못했습니다.');
        note = ' · xls(BIFF8)';
      } else {
        const { text, enc } = decodeText(buf);
        const d = sniffDelim(text, file.name);
        sheets = [sheetFromCSV(file.name.replace(/\.[^.]+$/, ''), parseCSV(text, d))];
        note = ' · ' + enc + ' · 구분자 ' + (d === '\t' ? 'TAB' : d);
      }
      FILES.push({
        name: file.name, sheets,
        label: file.name + ' · ' + (file.size / 1024).toFixed(0) + 'KB' + note
      });
    } catch(e){
      $('err').hidden = false;
      $('err').textContent = file.name + ' — 열기 실패: ' + e.message;
      console.error(e);
    }
  }
  if (!FILES.length) return;
  $('drop').style.display = 'none';
  $('main').style.display = 'flex';
  ['q','csv','copy','prev','next','fmt','hide','wrap','fit'].forEach(id => $(id).disabled = false);
  await pickFile(FILES.length - 1);
}

/* ---------------- 검색 ---------------- */
function search(){
  const q = $('q').value.trim().toLowerCase();
  for (const td of $('grid').querySelectorAll('td.hit, td.cur')) td.classList.remove('hit', 'cur');
  HITS = []; HI = -1;
  if (!q){ $('qn').textContent = ''; return; }

  // 1) 데이터 모델에서 먼저 탐색 (DOM 스캔·전체 로드 없이)
  const hitRows = [];
  const { rows, hideR, hideC, _ord: ord } = CUR;
  let total = 0;
  for (let i = 0; i < ord.length; i++){
    const r = ord[i];
    if (hideR.has(r)) continue;
    const row = rows[r];
    if (!row) continue;
    let found = false;
    for (let c = 0; c < row.length; c++){
      const cell = row[c];
      if (!cell || hideC.has(c)) continue;
      if (cell.v.toLowerCase().includes(q)){ total++; found = true; }
    }
    if (found) hitRows.push(i);
  }
  $('qn').textContent = total ? '1/' + total : '0건';
  if (!total) return;

  // 2) 결과가 있는 위치까지만 DOM 로드
  const last = hitRows[hitRows.length - 1];
  let guard = 0;
  while (SHOWN <= last && $('more') && guard++ < 500) loadMore();

  // 3) 로드된 범위에서 하이라이트
  markHits(q);
  if (HITS.length) move(0);
}
function markHits(q){
  HITS = [];
  const tb = $('grid').querySelector('tbody');
  if (!tb) return;
  for (const td of tb.querySelectorAll('td.cell'))
    if (td.textContent.toLowerCase().includes(q)){ td.classList.add('hit'); HITS.push(td); }
}
function move(i){
  if (!HITS.length) return;
  if (HI >= 0 && HITS[HI]) HITS[HI].classList.remove('cur');
  HI = (i + HITS.length) % HITS.length;
  const td = HITS[HI];
  td.classList.add('cur');
  td.scrollIntoView({ block: 'center', inline: 'center', behavior: 'smooth' });
  $('qn').textContent = (HI + 1) + '/' + HITS.length;
  showCell(td);
}

/* ---------------- 내보내기 ---------------- */
function grid2d(sh, r){
  const res = [];
  const R1 = r ? r.r1 : 0, R2 = r ? r.r2 : sh.rows.length - 1;
  const C1 = r ? r.c1 : 0, C2 = r ? r.c2 : sh.maxC;
  const ord = sh._ord || seq(sh.rows.length);
  for (let i = 0; i < ord.length; i++){
    const ri = ord[i];
    if (r && (ri < R1 || ri > R2)) continue;
    if (sh.hideR.has(ri)) continue;
    const row = sh.rows[ri] || [], line = [];
    for (let c = C1; c <= C2; c++){
      if (sh.hideC.has(c)) continue;
      line.push(row[c] ? row[c].v : '');
    }
    res.push(line);
  }
  return res;
}

/* ---------------- 바인딩 ---------------- */
$('file').onchange = e => e.target.files.length && openFiles([...e.target.files]);
['dragenter','dragover'].forEach(ev => document.body.addEventListener(ev, e => { e.preventDefault(); $('drop').classList.add('hot'); }));
['dragleave','drop'].forEach(ev => document.body.addEventListener(ev, e => { e.preventDefault(); $('drop').classList.remove('hot'); }));
document.body.addEventListener('drop', e => { if (e.dataTransfer.files.length) openFiles([...e.dataTransfer.files]); });

const grid = $('grid');
grid.addEventListener('mousedown', e => {
  const th = e.target.closest('thead th[data-c]');
  if (th && !e.target.classList.contains('rz')){
    const c = +th.dataset.c;
    if (!CUR.sortable){ $('cellval').textContent = '병합 셀이 있는 시트는 정렬할 수 없습니다'; return; }
    const head = hasHeader(CUR) ? 1 : 0;
    SORT = !SORT || SORT.c !== c ? { c, dir: 1, head }
      : SORT.dir === 1 ? { c, dir: -1, head } : null;
    render(CUR);
    return;
  }
  const td = e.target.closest('td.cell');
  if (!td) return;
  DRAG = true;
  ANCH = { r: +td.dataset.r, c: +td.dataset.c };
  SEL = { r1: ANCH.r, c1: ANCH.c, r2: ANCH.r, c2: ANCH.c };
  grid.querySelectorAll('td.cur').forEach(x => x.classList.remove('cur'));
  td.classList.add('cur');
  showCell(td); paint(); stat();
});
let RAF = 0;
grid.addEventListener('mouseover', e => {
  if (!DRAG) return;
  const td = e.target.closest('td.cell');
  if (!td || !ANCH) return;
  SEL = { r1: ANCH.r, c1: ANCH.c, r2: +td.dataset.r, c2: +td.dataset.c };
  if (RAF) return;
  RAF = requestAnimationFrame(() => { RAF = 0; paint(); stat(); });
});
document.addEventListener('mouseup', () => DRAG = false);

// 무한 스크롤
grid.addEventListener('scroll', () => {
  if ($('more') && grid.scrollTop + grid.clientHeight > grid.scrollHeight - 400) loadMore();
});

// 열 너비 드래그 (손잡이 전용 → 정렬 클릭과 충돌 없음)
let RZ = null;
function setW(sh, c, w){
  sh.widths[c] = Math.max(40, Math.min(1200, Math.round(w)));
}
function applyW(sh){
  const cols = sh._cols || [];
  const cg = grid.querySelectorAll('colgroup col');
  let total = 46;
  cols.forEach((c, i) => {
    const col = cg[i + 1];
    if (col) col.style.width = sh.widths[c] + 'px';
    total += sh.widths[c];
  });
  const tbl = grid.querySelector('table');
  if (tbl) tbl.style.width = total + 'px';
  freeze(sh);
}
grid.addEventListener('mousedown', e => {
  const h = e.target.closest('.rz');
  if (!h) return;
  e.preventDefault();
  e.stopPropagation();                       // 정렬 트리거 차단
  const c = +h.dataset.rz;
  RZ = { c, x: e.clientX, w: CUR.widths[c] };
  document.body.style.cursor = 'col-resize';
}, true);
document.addEventListener('mousemove', e => {
  if (!RZ) return;
  setW(CUR, RZ.c, RZ.w + e.clientX - RZ.x);
  applyW(CUR);
});
document.addEventListener('mouseup', () => {
  if (RZ){ RZ = null; document.body.style.cursor = ''; }
});

/* 내용에 맞춰 너비 자동 계산 */
function measure(sh, c){
  let w = 3;
  const N = Math.min(sh.rows.length, 2000);
  for (let r = 0; r < N; r++){
    if (sh.hideR.has(r)) continue;
    const cell = (sh.rows[r] || [])[c];
    if (!cell) continue;
    let n = 0;
    const t = cell.v;
    for (let i = 0; i < t.length; i++){
      const ch = t.charCodeAt(i);
      if (ch === 10){ n = 0; continue; }      // 줄바꿈은 최장 줄 기준
      n += ch > 0x2000 ? 1.85 : 1;
      if (n > w) w = n;
    }
  }
  return Math.max(48, Math.min(600, Math.round(w * 7.4) + 20));
}
function fitCol(c){ setW(CUR, c, measure(CUR, c)); applyW(CUR); }
function fitAll(){
  const r = selRange();
  const target = r && r.c1 !== r.c2 ? CUR._cols.filter(c => c >= r.c1 && c <= r.c2) : CUR._cols;
  for (const c of target) setW(CUR, c, measure(CUR, c));
  applyW(CUR);
}
grid.addEventListener('dblclick', e => {
  const h = e.target.closest('.rz');
  if (h){ e.preventDefault(); e.stopPropagation(); fitCol(+h.dataset.rz); }
}, true);

// 키보드
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'f'){ e.preventDefault(); $('q').focus(); $('q').select(); return; }
  if (e.altKey && (e.key === 'w' || e.key === 'W')){ e.preventDefault(); $('wrap').click(); return; }
  if (e.altKey && (e.key === 'f' || e.key === 'F')){ e.preventDefault(); if (CUR) fitAll(); return; }
  if (e.key === 'Enter' && !e.shiftKey && ANCH && e.target.tagName !== 'INPUT'){
    const tr1 = ROWEL.get(ANCH.r);
    const td = tr1 ? tr1.querySelector('td[data-c="' + ANCH.c + '"]') : null;
    if (td && td.textContent){ e.preventDefault(); showPop(td); return; }
  }
  if (e.target.tagName === 'INPUT') return;
  if (!ANCH || !CUR) return;
  const map = { ArrowUp:[-1,0], ArrowDown:[1,0], ArrowLeft:[0,-1], ArrowRight:[0,1] };
  const d = map[e.key];
  if (!d) return;
  e.preventDefault();
  // 화면에 보이는 순서(정렬·숨김 반영) 기준으로 이동
  const vr = CUR._vis, vc = CUR._cols;
  let ri = vr.indexOf(ANCH.r), ci = vc.indexOf(ANCH.c);
  if (ri < 0) ri = 0;
  if (ci < 0) ci = 0;
  ri = Math.max(0, Math.min(vr.length - 1, ri + d[0]));
  ci = Math.max(0, Math.min(vc.length - 1, ci + d[1]));
  const r = vr[ri], c = vc[ci];
  ANCH = { r, c };
  SEL = e.shiftKey && SEL ? { ...SEL, r2: r, c2: c } : { r1: r, c1: c, r2: r, c2: c };
  const tr0 = ROWEL.get(r);
  const td = tr0 ? tr0.querySelector('td[data-c="' + c + '"]') : null;
  if (td){
    grid.querySelectorAll('td.cur').forEach(x => x.classList.remove('cur'));
    td.classList.add('cur');
    td.scrollIntoView({ block: 'nearest', inline: 'nearest' });
    showCell(td);
  }
  paint(); stat();
});

let t = 0;
$('q').oninput = () => { clearTimeout(t); t = setTimeout(search, 200); };
$('q').onkeydown = e => {
  if (e.key === 'Enter'){ e.preventDefault(); HITS.length ? move(HI + (e.shiftKey ? -1 : 1)) : search(); }
  if (e.key === 'Escape'){ $('q').value = ''; search(); }
};
$('next').onclick = () => move(HI + 1);
$('prev').onclick = () => move(HI - 1);

$('csv').onclick = () => {
  const csv = grid2d(CUR).map(r => r.map(v =>
    /[",\n]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v).join(',')).join('\r\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF' + csv], { type: 'text/csv' }));
  a.download = CUR.name + '.csv';
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
};
$('copy').onclick = async () => {
  const r = selRange();
  const tsv = grid2d(CUR, r && (r.r1 !== r.r2 || r.c1 !== r.c2) ? r : null)
    .map(x => x.map(v => /[\t\r\n"]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v).join('\t'))
    .join('\r\n');
  const b = $('copy');
  try { await navigator.clipboard.writeText(tsv); b.textContent = '복사됨'; }
  catch {
    const ta = document.createElement('textarea');
    ta.value = tsv; document.body.appendChild(ta); ta.select();
    b.textContent = document.execCommand('copy') ? '복사됨' : '복사 실패';
    ta.remove();
  }
  setTimeout(() => b.textContent = '복사', 1200);
};


/* 헤더 우클릭 → 숨기기 / 더블클릭 → 그 열 숨김 해제 */
grid.addEventListener('contextmenu', e => {
  const th = e.target.closest('thead th[data-c]');
  const rh = e.target.closest('tbody th[data-hr]');
  if (!th && !rh) return;
  e.preventDefault();
  const r = selRange();
  if (th){
    const c = +th.dataset.c;
    if (r && c >= r.c1 && c <= r.c2) for (let i = r.c1; i <= r.c2; i++) CUR.hideC.add(i);
    else CUR.hideC.add(c);
  } else {
    const rr = +rh.dataset.hr;
    if (r && rr >= r.r1 && rr <= r.r2) for (let i = r.r1; i <= r.r2; i++) CUR.hideR.add(i);
    else CUR.hideR.add(rr);
  }
  SEL = null; applyHide();
});
$('hide').onclick = hideSel;
$('unhide').onclick = () => {
  if (!CUR) return;
  CUR.hideC.clear(); CUR.hideR.clear();
  applyHide();
};

/* 셀 더블클릭 → 전체 내용 팝업 */
const pop = $('pop');
function showPop(td){
  const txt = td.textContent;
  pop.innerHTML = '';
  const b = document.createElement('b');
  b.textContent = addrOf(td) + '  ·  ' + [...txt].length + '자';
  const body = document.createElement('div');
  body.textContent = txt;
  const btn = document.createElement('button');
  btn.className = 'cp'; btn.textContent = '복사';
  btn.onclick = async ev => {
    ev.stopPropagation();
    try { await navigator.clipboard.writeText(txt); btn.textContent = '복사됨'; }
    catch { btn.textContent = '복사 실패'; }
    setTimeout(() => btn.textContent = '복사', 1000);
  };
  pop.append(b, body, btn);
  pop.style.display = 'block';
  const r = td.getBoundingClientRect();
  const pw = pop.offsetWidth, ph = pop.offsetHeight;
  let x = Math.min(r.left, innerWidth - pw - 12);
  let y = r.bottom + 6;
  if (y + ph > innerHeight - 8) y = Math.max(8, r.top - ph - 6);
  pop.style.left = Math.max(8, x) + 'px';
  pop.style.top = y + 'px';
}
function hidePop(){ pop.style.display = 'none'; }
grid.addEventListener('dblclick', e => {
  const td = e.target.closest('td.cell');
  if (td && td.textContent) showPop(td);
});
document.addEventListener('mousedown', e => { if (!e.target.closest('#pop')) hidePop(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') hidePop(); });
grid.addEventListener('scroll', hidePop);

/* 줄바꿈 모드: 긴 텍스트를 여러 줄로 펼쳐 보기 */
$('wrap').onclick = () => {
  const on = grid.classList.toggle('wrap');
  $('wrap').classList.toggle('on', on);
  $('wrap').textContent = on ? '한 줄' : '줄바꿈';
  freeze(CUR);
};
$('fit').onclick = fitAll;

$('fmt').onclick = () => {
  const on = grid.classList.toggle('fmt');
  $('fmt').classList.toggle('on', on);
  $('fmt').textContent = on ? '기본 보기' : '원본 서식';
};

const root = document.documentElement;
const setTheme = m => { root.dataset.theme = m; $('theme').textContent = m === 'dark' ? '라이트' : '다크'; };
try {
  setTheme(window.matchMedia && matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
} catch(e){ setTheme('dark'); }
$('theme').onclick = () => setTheme(root.dataset.theme === 'dark' ? 'light' : 'dark');

/* ---------------- 자동 열기 (런처가 심은 파일 / ?src=) ---------------- */
window.addEventListener('DOMContentLoaded', function(){
  const b2u = b64 => {
    const bin = atob(b64.replace(/\s+/g, '')), u = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) u[i] = bin.charCodeAt(i);
    return u;
  };
  const el = document.getElementById('embed');
  let raw = el ? el.textContent.trim() : '';
  if (raw && raw !== '"__PAYLOAD__"'){
    try{
      let name = window.__NAME__ || '첨부파일.xlsx', b64 = raw;
      if (raw[0] === '{'){ const d = JSON.parse(raw); name = d.name || name; b64 = d.b64; }
      else if (raw[0] === '"'){ b64 = JSON.parse(raw); }
      document.title = name + ' — 표 뷰어';
      openFiles([new File([b2u(b64)], name)]);
      return;
    } catch(e){
      $('err').hidden = false;
      $('err').textContent = '파일 복원 실패: ' + e.message;
      console.error(e);
    }
  }
  const src = new URLSearchParams(location.search).get('src');
  if (src){
    fetch(src).then(r => r.blob())
      .then(b => openFiles([new File([b], decodeURIComponent(src.split(/[\\/]/).pop()))]))
      .catch(() => {
        $('err').hidden = false;
        $('err').textContent = '브라우저 보안정책상 로컬 파일 직접 읽기는 차단됩니다. 파일을 창에 끌어다 놓거나 런처를 사용하세요.';
      });
  }
});

if ('serviceWorker' in navigator && location.protocol === 'https:'){
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
