<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HWP·HWPX 뷰어 (무설치)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
    background: #262b36; color: #e8eaed;
    display: flex; flex-direction: column;
  }
  header.app {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 16px; background: #171b24;
    border-bottom: 1px solid #2c3444; flex-shrink: 0;
    flex-wrap: wrap; row-gap: 7px;          /* 좁은 화면(노트북·분할)에서 버튼이 밖으로 나가지 않게 */
  }
  header.app h1 { flex-shrink: 0; }
  #fname { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  @media (max-width: 700px) {
    header.app { padding: 8px 10px; gap: 7px; }
    #fname { max-width: 130px; }
  }
  header.app h1 { font-size: 15px; font-weight: 700; color: #7ab8ff; letter-spacing: -0.3px; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #2c3648; color: #9db8dd; display: none; }
  .fname { font-size: 12.5px; color: #9aa3b2; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 32vw; }
  .btn {
    font-size: 13px; padding: 6px 13px; border-radius: 6px; border: 1px solid #3a4356;
    background: #232b3a; color: #e8eaed; cursor: pointer; white-space: nowrap;
  }
  .btn:hover { background: #2c3648; }
  .btn.primary { background: #1a6fc4; border-color: #1a6fc4; }
  .btn.primary:hover { background: #1e7fe0; }
  .btn:disabled { opacity: .4; cursor: default; }
  .spacer { flex: 1; }
  .zoombox { display: none; align-items: center; gap: 4px; }
  .zoombox .btn { padding: 5px 10px; }
  .hint { font-size: 11.5px; color: #6b7484; }

  #drop {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; border: 2px dashed #3a4356; border-radius: 12px; margin: 24px; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  #drop.over { border-color: #1a6fc4; background: #1c2434; }
  #drop .big { font-size: 17px; font-weight: 700; }
  #drop .sub { font-size: 13px; color: #9aa3b2; line-height: 1.8; text-align: center; }
  #drop .sub b { color: #b8c4d6; }

  /* HWPX 페이지 레이아웃 */
  #hxScroll { flex: 1; min-height: 0; overflow: auto; display: none; padding: 28px 16px; }
  #hxZoom { margin: 0 auto; width: fit-content; }
  .hx-page { margin: 0 auto; background: transparent; }
  #loading {
    display: none; position: fixed; inset: 0; z-index: 50;
    background: rgba(11,15,22,.72); backdrop-filter: blur(2px);
    align-items: center; justify-content: center; flex-direction: column; gap: 14px;
    color: #d7dce5; font-size: 13.5px;
  }
  #loading.on { display: flex; }
  #loading .spin {
    width: 34px; height: 34px; border-radius: 50%;
    border: 3px solid rgba(255,255,255,.16); border-top-color: #4a9eff;
    animation: hxspin .8s linear infinite;
  }
  @keyframes hxspin { to { transform: rotate(360deg); } }
  @media print { #loading { display: none !important; } }
  .hx-pagecard[data-pg]::after {
    content: attr(data-pg);
    position: absolute; left: 0; right: 0; bottom: -19px;
    text-align: center; color: #7e8899; font-size: 11.5px; letter-spacing: .04em;
  }
  @media print { .hx-pagecard[data-pg]::after { content: none !important; } }
  .hx-pagecard {
    position: relative;
    background: #fff; color: #000;
    box-shadow: 0 3px 16px rgba(0,0,0,.45);
    margin: 0 auto 22px;
    box-sizing: border-box;
  }
  .hx-p { min-height: 1em; white-space: pre-wrap; word-break: keep-all; font-size: 10pt; }
  .hx-tbl { border-collapse: collapse; margin: 4px 0; max-width: 100%; }
  .hx-tbl td { padding: 2px 6px; vertical-align: middle; }
  .hx-shape { border: 1px dashed #bbb; padding: 4px 8px; margin: 3px 0; display: inline-block; }
  .hx-skip { color: #888; font-size: .85em; }
  .hx-caption { font-size: .85em; color: #444; margin: 2px 0 6px; }
  .hx-noteref { color: #1a56a0; font-size: .75em; }
  .hx-notes { margin-top: 18px; border-top: 1px solid #999; padding-top: 6px; }
  .hx-note { display: flex; gap: 4px; font-size: 8.5pt; color: #333; }
  .hx-notelab { flex-shrink: 0; }
  .hx-note .hx-p { font-size: 8.5pt; }

  /* hwp.js (바이너리) 컨테이너 */
  #binWrap { flex: 1; min-height: 0; display: none; }
  #binViewer { width: 100%; height: 100%; }

  #errbox {
    display: none; margin: 24px auto; max-width: 600px; background: #2a1f22;
    border: 1px solid #6b3a3a; border-radius: 10px; padding: 20px 24px; font-size: 13px; line-height: 1.9;
  }
  #errbox b { color: #ff9a9a; }
  input[type=file] { display: none; }

  @media print {
    header.app, #drop, #errbox { display: none !important; }
    .hx-tbl tr { break-inside: avoid; page-break-inside: avoid; }
    .hx-notes { break-inside: avoid; }
    body { background: #fff; display: block; }
    #hxScroll { display: block !important; overflow: visible; padding: 0; }
    #hxZoom { zoom: 1 !important; width: auto; }
    .hx-page { box-shadow: none; margin: 0; width: auto !important; min-height: 0 !important; }
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  }
</style>
<style id="pageStyle"></style>
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0b0f16">
</head>
<body>
  <header class="app">
    <h1>HWP 뷰어 <small style="font-size:10px;color:#5b6activity"></small><span style="font-size:10px;color:#6b7484">v17</span></h1>
    <span class="badge" id="badge"></span>
    <span class="badge" id="fontBadge" style="background:#274233;color:#9fd8b0"></span>
    <button class="btn primary" id="btnOpen">파일 열기</button>
    <span class="fname" id="fname"></span>
    <span class="spacer"></span>
    <span class="zoombox" id="zoombox">
      <button class="btn" id="zOut" title="Ctrl −">−</button>
      <select id="zoomSel" class="btn" title="배율 선택" style="min-width:86px">
        <option value="fitw">폭맞춤</option>
        <option value="fitp">쪽맞춤</option>
        <option value="0.75">75%</option>
        <option value="1">100%</option>
        <option value="1.25">125%</option>
        <option value="1.5">150%</option>
        <option value="2">200%</option>
        <option value="custom" hidden></option>
      </select>
      <button class="btn" id="zIn" title="Ctrl +">＋</button>
    </span>
    <button class="btn" id="btnCompat" style="display:none">호환 모드</button>
    <button class="btn primary" id="btnPdf" style="display:none">PDF 저장</button>
    <span class="hint" id="binHint" style="display:none">PDF: 뷰어 안 인쇄 아이콘 사용</span>
    <button class="btn" id="btnReset" style="display:none">다른 파일</button>
  </header>

  <div id="drop">
    <div class="big">HWP / HWPX 파일을 여기에 끌어다 놓기</div>
    <div class="sub">
      또는 클릭하여 파일 선택 — 확장자와 무관하게 <b>실제 파일 형식 자동 판별</b><br>
      · 무설치 단일 HTML · 오프라인 동작 · 파일 외부 전송 없음<br>
      · HWP 5.x / HWPX 자체 렌더러 — 원본 줄·쪽 좌표 그대로 재현<br>
      · 원본과 같은 쪽 나눔 · PDF 저장 시 쪽수 일치 · Ctrl+휠로 배율 조정<br>
      · <b>글꼴 파일(ttf/otf)을 끌어넣으면 설치 없이 원본 글꼴로 표시</b> — 한 번 등록하면 계속 유지
    </div>
  </div>

  <div id="hxScroll"><div id="hxZoom"><div class="hx-page" id="hxPage"></div></div></div>
  <div id="binWrap"><div id="binViewer"></div></div>

  <div id="loading">
    <div class="spin"></div>
    <div id="loadmsg">문서 읽는 중…</div>
  </div>

  <div id="errbox">
    <b>열기 실패</b><br>
    <span id="errmsg"></span><br><br>
    <span id="errguide"></span>
  </div>

  <input type="file" id="fileInput" accept=".hwp,.hwpx,.ttf,.otf,.ttc" multiple>

            common.flow = (cAttr >>> 21) & 7;   // 0 어울림 / 1 자리차지 / 2 글뒤 / 3 글앞
            common.halign = (cAttr >>> 10) & 7; // 0 왼 / 1 가운데 / 2 오른

        if (id === CT.TBL) {

            width: common.w, inline: common.inline, flow: common.flow, halign: common.halign };
          while (pos < rs.length && rs[pos].level > level) {

            if (c.tag === T.TABLE) {

          var box = { type: 'textbox', paras: [], width: common.w, height: common.h, inline: common.inline, flow: common.flow, halign: common.halign };
          while (pos < rs.length && rs[pos].level > level) {

            else if (c2.tag === 88) {              // EQEDIT: 수식 스크립트

        } else if (id === CT.EQ) {

    var paras = [];
    while (pos < rs.length) {

  /* ---------- 렌더 ---------- */
  function applyPara(div, ps) {
    if (!ps) { div.style.lineHeight = 1.6; return; }
    var align = ['justify', 'left', 'right', 'center', 'justify', 'justify'][ps.align] || 'justify';
    div.style.textAlign = align;
    if (ps.align === 4 || ps.align === 5) div.style.textAlignLast = 'justify'; // 배분/나눔
    if (ps.left) div.style.marginLeft = (ps.left * U2PX) + 'px';
    if (ps.right) div.style.marginRight = (ps.right * U2PX) + 'px';
    if (ps.indent > 0) div.style.textIndent = (ps.indent * U2PX) + 'px';
    else if (ps.indent < 0) { div.style.paddingLeft = (-ps.indent * U2PX) + 'px'; div.style.textIndent = (ps.indent * U2PX) + 'px'; }
    if (ps.prev) div.style.marginTop = (ps.prev * U2PX) + 'px';
    if (ps.next) div.style.marginBottom = (ps.next * U2PX) + 'px';
    if (ps.lineType === 0 && ps.line >= 50 && ps.line <= 500) div.style.lineHeight = (ps.line / 100);
    else if ((ps.lineType === 1 || ps.lineType === 3) && ps.line > 0) div.style.lineHeight = Math.max(12, ps.line * U2PX) + 'px';
    else div.style.lineHeight = 1.6;
  }

  function applyChar(span, cs, ctx) {
    if (!cs) return;
    span.style.fontSize = cs.size + 'pt';
    if (cs.bold) span.style.fontWeight = 'bold';
    if (cs.italic) span.style.fontStyle = 'italic';
    var deco = [];
    if (cs.underline) deco.push('underline');
    if (cs.strike) deco.push('line-through');
    if (deco.length) span.style.textDecoration = deco.join(' ');
    if (cs.underline && cs.ulColor && cs.ulColor !== cs.color) span.style.textDecorationColor = colorCss(cs.ulColor);
    if (cs.color) span.style.color = colorCss(cs.color);
    var face = ctx.info.fonts[cs.fontId];
    if (face) {
      span.style.fontFamily = window.HWPX.fontFallback(face);
      ctx.usedFonts[face] = true;
      if (!cs.bold && window.HWPX.faceWeight(face) && !window.HWPX.faceInstalled(face)) span.style.fontWeight = 'bold';
    }
    if (cs.spacing) span.style.letterSpacing = (cs.spacing / 100) + 'em';
    if (cs.ratio && cs.ratio !== 100) span.style.fontStretch = cs.ratio + '%';
  }

  function fmtNumber(fmt, ctx, numId) {
    return fmt.replace(/\^([1-7])/g, function (_, d) {
      var lv = +d - 1;
      var c = (ctx.counters[numId] || [])[lv];
      return String(c || 1);
    });
  }

  function headMarker(ps, ctx) {
    if (!ps || !ps.headShape) return null;
    var lv = Math.min(ps.level || 0, 6);
    var text = null;
    if (ps.headShape === 3) text = ctx.info.bullets[ps.numId] || '\u2022';
    else { // 개요(1)/번호(2)
      var num = ctx.info.numberings[ps.numId];

      }
      ctx.counters[key][lv]++;

      if (num && num.levels[lv]) text = fmtNumber(num.levels[lv], { counters: { _: ctx.counters[key] } }, '_');

  var PT2PX = 96 / 72;

  // 원본 줄 분해(LINE_SEG) 재현 — 줄 높이·분절·들여를 파일 값 그대로
  function renderParaSeg(para, ctx, flowState, pager) {
    var ps = ctx.info.paraShapes[para.shapeId];
    var align = ps ? (['justify', 'left', 'right', 'center', 'justify', 'justify'][ps.align] || 'justify') : 'justify';
    var mkDiv = function () {
      var d = ctx.doc.createElement('div');
      d.className = 'hx-p hx-seg';
      d.style.minHeight = '0';
      if (ps && ps.left) d.style.marginLeft = (ps.left * U2PX) + 'px';
      if (ps && ps.right) d.style.marginRight = (ps.right * U2PX) + 'px';
      return d;
    };
    var div = mkDiv();
    div.dataset.y0 = para.segs[0].y.toFixed(2);
    if (pager) pager.cur().appendChild(div);   // pager 모드: 문단 조각을 카드에 직접 커밋
    // 문단 간 간격 = 누적 y의 갭 (문단모양 간격이 이미 반영된 값)
    if (flowState) {
      var startRef = (flowState.prevEnd !== null) ? flowState.prevEnd
        : (flowState.base !== undefined ? flowState.base : para.segs[0].y);   // 셀·글상자: 첫 gap 없음(padding이 담당)
      var gap = para.segs[0].y - startRef;
      if (gap > 0.05 && gap < 2000) div.style.marginTop = (gap * PT2PX) + 'px';
      flowState.prevEnd = para.segs[para.segs.length - 1].y + para.segs[para.segs.length - 1].box;
    }

    var runs = para.runs.length ? para.runs : [[0, 0]];
    var ri = 0, span = null, buf = '';
    var segIdx = 0, subIdx = 0, line = null, sink = null;
    var openSub = function () {
      var s = para.segs[segIdx];
      if (s.subs.length > 1) {
        sink = ctx.doc.createElement('span');
        sink.style.position = 'absolute';
        sink.style.left = (s.subs[subIdx].x * PT2PX) + 'px';
        sink.style.top = '0';
        sink.style.whiteSpace = 'pre';
        line.appendChild(sink);
      }
    };
    var openLine = function () {
      line = ctx.doc.createElement('div');
      var s = para.segs[segIdx];
      line.style.height = (s.box * PT2PX) + 'px';          // 줄박스 = 파일 값 고정
      line.style.lineHeight = (s.h * PT2PX) + 'px';        // 텍스트는 상단 h 영역
      // overflow 봉인 제거: height 고정으로 충분, hidden은 디센더를 절단해 '중간 라인' 유발
                       // 폰트박스가 밀어올리지 못하게 봉인
      line.style.whiteSpace = 'pre';
      if (s.subs.length > 1) {                              // 탭 다열 줄: 서브세그 절대배치
        line.style.position = 'relative';

        return;
      }
      // 들여폭: seg.x 우선(신파일), 0이면 문단모양 폴백(구파일)
      var padPx = s.x > 0.05 ? s.x * PT2PX : 0;

        else if (segIdx > 0 && ps.indent < 0) padPx = -ps.indent * U2PX;
      }
      if (padPx) line.style.paddingLeft = padPx + 'px';
      var last = segIdx === para.segs.length - 1;
      line.style.textAlign = align;

      subIdx = 0; sink = line;
      div.appendChild(line);
    };
    var flush = function () {
      if (span && buf) { span.appendChild(ctx.doc.createTextNode(buf)); sink.appendChild(span); }
      buf = ''; span = null;
    };
    var ensure = function (idx) {
      while (ri + 1 < runs.length && idx >= runs[ri + 1][0]) { flush(); ri++; }
      if (!span) { span = ctx.doc.createElement('span'); applyChar(span, ctx.info.charShapes[runs[ri][1]], ctx); }
    };
    var maybeBreak = function () {
      if (!pager) return;

        flush();
        if (!div.childNodes.length && div.parentNode) div.parentNode.removeChild(div); // seg0 브레이크: 빈 조각 정리
        var np = pager.page();                 // 새 카드
        div = mkDiv();                          // 같은 문단의 잔여 줄용 새 컨테이너
        div.dataset.y0 = s.y.toFixed(2);
        np.appendChild(div);
        flowState.prevEnd = null;               // 새 페이지 y 회계 리셋
        var g2 = s.y - 0;
        if (g2 > 0.05 && g2 < 2000) div.style.marginTop = (g2 * PT2PX) + 'px';

        flush(); segIdx++; maybeBreak(); openLine();
      }
      var sNow = para.segs[segIdx];
      while (subIdx + 1 < sNow.subs.length && i >= sNow.subs[subIdx + 1].pos) { flush(); subIdx++; openSub(); }
      var ch = para.chars[i];
      if (ch === null || typeof ch === 'object') continue;
      if (ch === '\n') continue;             // 줄바꿈은 seg 경계가 담당
      if (sNow.subs.length > 1 && ch === '\t') continue; // 탭 줄: 위치는 x로 재현

    }

  function canSeg(para) {

    var prev = -1;
    for (var i = 0; i < para.segs.length; i++) {
      var p = para.segs[i].pos;
      if (p <= prev && i > 0) return false;
      if (p > para.chars.length) return false;
      if (!(para.segs[i].box > 0.5 && para.segs[i].box < 400)) return false;
      prev = p;
    }
    return true;
  }

  function renderPara(para, ctx) {
    var div = ctx.doc.createElement('div');
    div.className = 'hx-p';
    var ps = ctx.info.paraShapes[para.shapeId];
    applyPara(div, ps);
    var runs = para.runs.length ? para.runs : [[0, 0]];
    var marker = headMarker(ps, ctx);
    if (marker) {
      var mk = ctx.doc.createElement('span');
      applyChar(mk, ctx.info.charShapes[runs[0][1]], ctx);
      mk.textContent = marker;
      div.appendChild(mk);
    }
    var ri = 0, span = null, buf = '', blockQ = para.blocks.slice();
    var flush = function () {
      if (span && buf) { span.appendChild(ctx.doc.createTextNode(buf)); div.appendChild(span); }
      buf = ''; span = null;
    };
    var ensure = function (idx) {
      while (ri + 1 < runs.length && idx >= runs[ri + 1][0]) { flush(); ri++; }
      if (!span) { span = ctx.doc.createElement('span'); applyChar(span, ctx.info.charShapes[runs[ri][1]], ctx); }
    };

        if (blk) div.appendChild(renderBlock(blk, ctx));
        continue;
      }
      ensure(i);
      if (ch === '\n') { flush(); div.appendChild(ctx.doc.createElement('br')); }
      else buf += ch;
    }
    flush();
    blockQ.forEach(function (blk) { div.appendChild(renderBlock(blk, ctx)); });
    if (para.broken && !div.textContent.trim()) {
      var bk = ctx.doc.createElement('span');
      bk.className = 'hx-skip';
      bk.textContent = '[문단 판독 실패]';
      div.appendChild(bk);
    }
    if (!div.childNodes.length) {

      var es = ctx.doc.createElement('span');
      applyChar(es, ctx.info.charShapes[runs[0][1]], ctx);
      es.innerHTML = '&nbsp;';
      div.appendChild(es);
    }
    return div;
  }

  function cellBorder(td, bf) {
    var map = { left: 'borderLeft', right: 'borderRight', top: 'borderTop', bottom: 'borderBottom' };
    for (var side in map) {
      var bd = bf && bf[side];
      if (!bf) { td.style[map[side]] = '1px solid #666'; continue; }
      if (!bd || bd.stroke === 0) { td.style[map[side]] = 'none'; continue; }
      var mm = BW_MM[bd.width] || 0.12;
      var px = Math.max(1, Math.round(mm * 96 / 25.4));
      var style = STROKE[bd.stroke] || 'solid';
      if (style === 'inset' || style === 'outset' || style === 'groove' || style === 'ridge') style = 'solid';
      td.style[map[side]] = px + 'px ' + style + ' ' + colorCss(bd.color);
    }
    if (bf && bf.bg !== null && bf.bg !== undefined && bf.bg !== 0xffffff) td.style.background = colorCss(bf.bg);
  }

  function applyWrapFloat(el, blk) {
    // 글자처럼(X) + 어울림(0)/글뒤(2)/글앞(3): 세로 공간을 차지하지 않음 — float로 근사
    if (blk.inline || blk.flow === 1 || blk.flow === undefined) return false;
    var right = blk.halign !== 0;            // 왼쪽 정렬만 좌측, 그 외 우측
    el.style.cssFloat = right ? 'right' : 'left';
    el.style.margin = right ? '2px 0 6px 10px' : '2px 10px 6px 0';
    return true;
  }

  function renderBlock(blk, ctx) {
    if (blk.type === 'table') {
      var wrap = null;
      var table = ctx.doc.createElement('table');
      table.className = 'hx-tbl';
      // 열 너비 확정: colSpan 1 셀 우선, 스팬 셀은 미확정 열에 잔여 균등 배분
      var nCols = blk.cols || 0;
      blk.cells.forEach(function (c) { nCols = Math.max(nCols, c.col + (c.colSpan || 1)); });
      var colW = new Array(nCols).fill(0);
      blk.cells.forEach(function (c) {
        if ((c.colSpan || 1) === 1 && c.width > 0) colW[c.col] = Math.max(colW[c.col], c.width);
      });
      blk.cells.forEach(function (c) {
        var span = c.colSpan || 1;
        if (span > 1 && c.width > 0) {
          var unknown = [], known = 0;
          for (var k = c.col; k < c.col + span && k < nCols; k++) (colW[k] ? known += colW[k] : unknown.push(k));
          if (unknown.length) {

          }
        }
      });

      if (sumW > 0 && nCols > 0) {

          var col = ctx.doc.createElement('col');
          col.style.width = ((w / sumW) * 100).toFixed(3) + '%';
          cg.appendChild(col);
        });
        table.appendChild(cg);
        table.style.tableLayout = 'fixed';
        table.style.width = (sumW * U2PX) + 'px';
        table.style.maxWidth = '100%';
      }
      var grid = [];
      blk.cells.forEach(function (c) { (grid[c.row] = grid[c.row] || []).push(c); });
      grid.forEach(function (rowCells) {
        if (!rowCells) return;

        rowCells.sort(function (a, b) { return a.col - b.col; });
        rowCells.forEach(function (c) {
          var td = ctx.doc.createElement('td');
          if (c.colSpan > 1) td.colSpan = c.colSpan;
          if (c.rowSpan > 1) td.rowSpan = c.rowSpan;
          if (c.height > 0 && c.height < 500000) td.style.height = (c.height * U2PX) + 'px';
          if (c.pad) td.style.padding = (Math.max(0, c.pad[2]) * U2PX) + 'px ' + (Math.max(0, c.pad[1]) * U2PX) + 'px ' +
            (Math.max(0, c.pad[3]) * U2PX) + 'px ' + (Math.max(0, c.pad[0]) * U2PX) + 'px';
          cellBorder(td, ctx.info.borderFills[c.borderFillId]);

        });

      });
      if (blk.caption.length) {

        wrap.appendChild(table);
        var cap = ctx.doc.createElement('div');
        cap.className = 'hx-caption';
        blk.caption.forEach(function (p) { cap.appendChild(renderPara(p, ctx)); });
        wrap.appendChild(cap);

      }
      applyWrapFloat(table, blk);
      return table;
    }
    if (blk.type === 'eq') {
      var eqs = ctx.doc.createElement('span');
      eqs.className = 'hx-eq';
      eqs.textContent = blk.script || '[수식]';
      eqs.style.fontFamily = '"Times New Roman", serif';
      eqs.style.fontStyle = 'italic';
      eqs.style.background = '#f4f6fa';
      eqs.style.padding = '0 3px';
      eqs.style.borderRadius = '2px';
      return eqs;
    }
    if (blk.type === 'textbox') {
      if (blk.eqScript) {
        var eqs2 = ctx.doc.createElement('span');
        eqs2.className = 'hx-eq';
        eqs2.textContent = blk.eqScript;
        eqs2.style.fontFamily = '"Times New Roman", serif';
        eqs2.style.fontStyle = 'italic';
        eqs2.style.background = '#f4f6fa';
        eqs2.style.padding = '0 3px';
        eqs2.style.borderRadius = '2px';
        return eqs2;
      }
      var picUrl = blk.picId ? ctx.binUrl(blk.picId) : null;
      if (picUrl) {
        var img = ctx.doc.createElement('img');
        img.src = picUrl;
        img.style.verticalAlign = 'middle';
        if (blk.width > 0) img.style.width = (blk.width * U2PX) + 'px';

      }
      var hasText = blk.paras.some(function (p) { return p.chars.some(function (c) { return typeof c === 'string'; }); });
      var box = ctx.doc.createElement(hasText ? 'div' : 'span');
      box.className = hasText ? 'hx-shape' : 'hx-skip hx-obj';
      if (hasText) {

      box.style.verticalAlign = 'middle';
      box.style.boxSizing = 'border-box';

      if (blk.height > 0) box.style.minHeight = (blk.height * U2PX) + 'px';
      if (!blk.inline && hasText) { box.style.display = 'block'; box.style.width = ''; if (blk.width > 0) box.style.maxWidth = (blk.width * U2PX) + 'px'; }

  /* ---------- 진입 ---------- */
  function render(binary, container, docRef) {
    var CFB = window.HWPLIB.CFB, inflate = window.HWPLIB.inflateRaw;

    var compressed = !!(flags & 1);
    var get = function (name) {
      var e = CFB.find(cont, name);
      if (!e) return null;
      var u8 = e.content instanceof Uint8Array ? e.content : Uint8Array.from(e.content);

    };

    var urlCache = {}, urls = [];
    var MIME = { png: 'image/png', jpg: 'image/jpeg', jpeg: 'image/jpeg', gif: 'image/gif', bmp: 'image/bmp' };

      if (!id || !info.binData[id]) return null;
      if (id in urlCache) return urlCache[id];
      var bd = info.binData[id];
      var name = 'BIN' + id.toString(16).toUpperCase().padStart(4, '0') + '.' + bd.ext;
      var e = CFB.find(cont, 'Root Entry/BinData/' + name) || CFB.find(cont, 'BinData/' + name);

      if (bd.comp !== 2) { try { data = inflate(raw); } catch (ez) { data = raw; } }

      } catch (eb) { urlCache[id] = null; return null; }
    }
    var ctx = { info: info, doc: docRef, usedFonts: {}, counters: {}, binUrl: binUrl };

    var pageInfo = null;
    var totalParas = 0;
    for (var s = 0; s < 64; s++) {
      var body = get('Root Entry/BodyText/Section' + s) || get('BodyText/Section' + s);
      if (!body) break;   // 선언값(sectionSize) 오류 방어: 실재 스트림 기준
      var sec = parseSection(body, ctx);
      totalParas += sec.paras.length;
      if (!pageInfo && sec.pageInfo) pageInfo = sec.pageInfo;
      var secDiv = docRef.createElement('div');
      secDiv.className = 'hx-section';
      var pi2 = pageInfo || { w: 59528, h: 84188, ml: 8504, mr: 8504, mt: 5668, mb: 4252 };
      var curPage = -1, pageDiv = null;
      var flowState = { prevEnd: null, base: 0 };
      var openPage = function () {
        curPage++;
        pageDiv = docRef.createElement('div');
        pageDiv.className = 'hx-pagecard';
        secDiv.appendChild(pageDiv);
        flowState.prevEnd = null;
        flowState.base = 0;
      };
      var pager = {
        lastEnd: -1,
        shouldBreak: function (y) { return this.lastEnd >= 0 && y + 0.5 < this.lastEnd; },
        mark: function (end) { if (end > this.lastEnd) this.lastEnd = end; else this.lastEnd = end; },
        page: function () { openPage(); this.lastEnd = -1; return pageDiv; },
        cur: function () { return pageDiv; }
      };
      openPage();
      sec.paras.forEach(function (p) {
        var hasY = p.segs.length > 0;
        if (canSeg(p)) {
          renderParaSeg(p, ctx, flowState, pager);   // 줄 단위로 카드에 직접 커밋
        } else {
          if (hasY && pager.lastEnd > 100 && pager.shouldBreak(p.segs[0].y)) pager.page(); // 개체 y는 배치좌표 오염 가능: 페이지가 충분히 진행된 경우만 리셋 인정
          var el = renderPara(p, ctx);
          if (hasY) { // 표·개체 문단: 원본 y로 위치 잡고 회계 지속 (이중 계상 방지)
            var startRef = (flowState.prevEnd !== null) ? flowState.prevEnd : flowState.base;
            var gap = p.segs[0].y - startRef;
            if (gap > 0.05 && gap < 2000) el.style.marginTop = (gap * (96 / 72)) + 'px';
            var lastS = p.segs[p.segs.length - 1];
            el.dataset.fy0 = p.segs[0].y.toFixed(2);       // 부착 후 실높이 보정용
            el.dataset.fend = (lastS.y + lastS.box).toFixed(2);
            pageDiv.appendChild(el);
            flowState.prevEnd = lastS.y + lastS.box;
            pager.mark(lastS.y + lastS.box);
          } else { flowState.prevEnd = null; pageDiv.appendChild(el); }
        }
      });
      if (sec.notes.length) {
        var noteBox = docRef.createElement('div');
        noteBox.className = 'hx-notes';
        sec.notes.forEach(function (fps, i) {
          var row = docRef.createElement('div');
          row.className = 'hx-note';
          var lab = docRef.createElement('span');
          lab.className = 'hx-notelab';
          lab.textContent = (i + 1) + ') ';
          row.appendChild(lab);
          var body2 = docRef.createElement('div');
          fps.forEach(function (p) { body2.appendChild(renderPara(p, ctx)); });
          row.appendChild(body2);
          noteBox.appendChild(row);
        });
        secDiv.appendChild(noteBox);
      }
      container.appendChild(secDiv);
    }
    if (totalParas === 0) throw new Error('본문 추출 실패 (문단 구조 없음)');
    return {
      fonts: Object.keys(ctx.usedFonts), urls: urls,
      pageInfo: pageInfo || { w: 59528, h: 84188, ml: 8504, mr: 8504, mt: 5668, mb: 4252 },
      U2PX: U2PX, U2MM: U2MM
    };
  }

  window.HWPBIN = { render: render };
})();

<script>
(function () {

  var userFonts = [];

  /* ---- 글꼴 드롭인 (설치 없이 FontFace 등록, IndexedDB 영속) ---- */

    return idb().then(function (db) {

  var fontBadgeEl = null;

  function setZoom(z) {

  }

  // 사용자 PC 글꼴 폭이 원본과 달라도 줄이 잘리거나 겹치지 않게: 넘치는 줄만 가로 축소

    var lines = root.querySelectorAll('.hx-seg > div');
    for (var i = 0; i < lines.length; i++) {
      var l = lines[i];
      var subs = l.querySelectorAll(':scope > span[style*="absolute"]');

            var c2 = document.createElement('div');
            c2.className = el.className;
            c2.style.cssText = el.style.cssText;
            c2.style.marginTop = '0';

  // 개체 높이가 앵커줄에 미포함인 저장기 호환: 부착 후 실측으로 표 직후 간격 재계산
  function reflowFlowGaps(root) {
    var PT = 96 / 72;
    root.querySelectorAll('.hx-pagecard').forEach(function (card) {

      });

      var excess = card.scrollHeight - (parseFloat(card.style.minHeight) || card.scrollHeight);
      if (excess > 1) {

          return (parseFloat(u.style.marginTop) || 0) > 2;
        });
        var totalGap = gaps.reduce(function (a, u) { return a + parseFloat(u.style.marginTop); }, 0);
        if (totalGap > 1) {
          var take = Math.min(excess, totalGap - gaps.length);
          gaps.forEach(function (u) {
            var g = parseFloat(u.style.marginTop);
            u.style.marginTop = Math.max(1, g - take * (g / totalGap)) + 'px';
          });
        }
      }
    });
  }

  function showPaged(info, badgeText) {
    blobUrls = info.urls || [];
    var pi = info.pageInfo;
    pagePxWidth = pi.w * info.U2PX;
    hxPage.style.width = pagePxWidth + 'px';
    hxPage.style.minHeight = '0';
    hxPage.style.padding = '0';
    var contentHmm = ((pi.h - pi.mt - pi.mb) * info.U2MM).toFixed(2);
    var cards = hxPage.querySelectorAll('.hx-pagecard');
    var padCss = (pi.mt * info.U2PX) + 'px ' + (pi.mr * info.U2PX) + 'px ' + (pi.mb * info.U2PX) + 'px ' + (pi.ml * info.U2PX) + 'px';
    for (var ci = 0; ci < cards.length; ci++) {
      cards[ci].style.width = pagePxWidth + 'px';
      cards[ci].style.minHeight = (pi.h * info.U2PX) + 'px';
      cards[ci].style.padding = padCss;
      cards[ci].style.setProperty('--hx-padtop', (pi.mt * info.U2PX) + 'px');
    }
    var contentHpx = (pi.h - pi.mt - pi.mb) * info.U2PX;
    var safety = pi.mb * info.U2PX;            // 하단 여백 = 클립 안전마진
    setTimeout(function () {
      for (var cj = 0; cj < cards.length; cj++) {
        var overPx = cards[cj].scrollHeight - (pi.h * info.U2PX);
        if (overPx > safety - 6) cards[cj].classList.add('hx-tall'); // 여백 초과: 클립 대신 자연 확장
      }
    }, 80);
    if (!cards.length) { // 카드 미생성 경로(구형) 폴백
      hxPage.style.minHeight = (pi.h * info.U2PX) + 'px';
      hxPage.style.padding = padCss;
    }
    var wmm = (pi.w * info.U2MM).toFixed(1), hmm = (pi.h * info.U2MM).toFixed(1);
    $('pageStyle').textContent =
      '@media print { @page { size: ' + wmm + 'mm ' + hmm + 'mm; ' +
      'margin: ' + (pi.mt * info.U2MM).toFixed(1) + 'mm ' + (pi.mr * info.U2MM).toFixed(1) + 'mm ' + (pi.mb * info.U2MM).toFixed(1) + 'mm ' + (pi.ml * info.U2MM).toFixed(1) + 'mm; } ' +
      '.hx-page, .hx-pagecard { padding: 0 !important; min-height: 0 !important; width: auto !important; box-shadow: none !important; margin: 0 !important; } ' +
      '.hx-pagecard { break-after: page; page-break-after: always; height: ' + contentHmm + 'mm !important; overflow: hidden !important; } ' +
      '.hx-pagecard.hx-tall { height: auto !important; overflow: visible !important; } ' +
      '.hx-pagecard:last-child { break-after: auto; page-break-after: auto; } }';
    drop.style.display = 'none';
    hxScroll.style.display = 'block';
    paginate(hxPage, (pi.h - pi.mt - pi.mb) * info.U2PX);
    var cards2 = hxPage.querySelectorAll('.hx-pagecard');
    for (var c2i = 0; c2i < cards2.length; c2i++) {
      cards2[c2i].style.width = pagePxWidth + 'px';
      cards2[c2i].style.minHeight = (pi.h * info.U2PX) + 'px';
      cards2[c2i].style.padding = padCss;
      cards2[c2i].style.setProperty('--hx-padtop', (pi.mt * info.U2PX) + 'px');
    }
    reflowFlowGaps(hxPage);
    // 보더 누적 잔차(수십 px): 초과 카드만 미세 zoom으로 A4 봉인 (내용 무손실)
    var cardsF = hxPage.querySelectorAll('.hx-pagecard');
    for (var cf = 0; cf < cardsF.length; cf++) {
      var cEl = cardsF[cf];
      cEl.style.zoom = '';
      var minH = parseFloat(cEl.style.minHeight) || 0;
      if (minH && cEl.scrollHeight > minH + 2) {
        var z = minH / cEl.scrollHeight;
        if (z > 0.9) cEl.style.zoom = z.toFixed(4);   // 10% 초과 왜곡은 금지(구조 문제는 드러나야 함)
      }
    }
    // 쪽 번호: 카드 속성으로만 표기 (별도 노드 금지 — 인쇄 페이지 분절을 교란함)
    var cardsN = hxPage.querySelectorAll('.hx-pagecard');
    for (var cn = 0; cn < cardsN.length; cn++)
      cardsN[cn].setAttribute('data-pg', (cn + 1) + ' / ' + cardsN.length);

    zoombox.style.display = 'flex';
    btnPdf.style.display = 'inline-block';
    btnReset.style.display = 'inline-block';
    var missing = [];
    try {
      if (document.fonts && document.fonts.check) {
        (info.fonts || []).forEach(function (f) { if (!document.fonts.check('12px "' + f + '"')) missing.push(f); });
      }
    } catch (e) {}
    if (missing.length) {
      showBadge(badgeText + ' · 글꼴 ' + missing.length + '종 대체');
      badge.title = '미설치 글꼴(유사 글꼴로 대체 중): ' + missing.join(', ') + ' — ttf 파일을 끌어넣으면 원본 표시';
    } else { showBadge(badgeText); badge.title = ''; }
    applyZoomMode();
    busy = false;
    setLoading(false);
    scheduleFit();
    try { if (document.fonts && document.fonts.ready) document.fonts.ready.then(scheduleFit); } catch (e) {}
  }

  function openHWPX(u8) {
    var files;
    try { files = window.HWPLIB.unzipSync(u8); }
    catch (e) { return fail('압축 해제 실패: ' + e.message, 'HWPX 구조가 손상되었을 수 있음 (망간 전송 손상 등)'); }
    var keys = Object.keys(files);
    if (!keys.some(function (k) { return /header\.xml$/i.test(k); })) {
      if (keys.some(function (k) { return /^word\//.test(k); })) return fail('이 파일은 Word 문서(docx)', '확장자만 hwp로 되어 있음 — Word에서 열어야 함');
      if (keys.some(function (k) { return /^xl\//.test(k); })) return fail('이 파일은 Excel 문서(xlsx)', '확장자만 hwp로 되어 있음 — Excel에서 열어야 함');
      if (keys.some(function (k) { return /^ppt\//.test(k); })) return fail('이 파일은 PowerPoint 문서(pptx)', '확장자만 hwp로 되어 있음');
      return fail('HWPX 구조 아님 (header.xml 없음)', 'zip 형식이지만 한글 문서가 아님');
    }
    try {
      var info = window.HWPX.render(files, hxPage, document);
      showPaged(info, 'HWPX');
    } catch (e) {
      console.error(e);
      fail('HWPX 렌더링 실패: ' + e.message, '파일 구조가 표준과 다르거나 손상됨');
    }
  }

  var currentBinary = null;
  function openBinary(binaryStr) {
    currentBinary = binaryStr;
    try {
      var info = window.HWPBIN.render(binaryStr, hxPage, document);
      showPaged(info, 'HWP 5.0 · 전용 렌더러');
      btnCompat.style.display = 'inline-block';
      btnCompat.textContent = '호환 모드';
      return;
    } catch (e) {
      console.warn('전용 렌더러 실패, hwp.js 폴백:', e.message);
      if (/암호화|배포용/.test(e.message)) {
        return fail('배포용(암호화) 문서 — 열 수 없음', '원본 작성자에게 일반 저장본 요청 필요');
      }
      hxPage.innerHTML = '';
    }
    openLegacy(binaryStr);
  }

  function openLegacy(binaryStr, revertOnFail) {
    try {
      hxScroll.style.display = 'none';
      zoombox.style.display = 'none';
      btnPdf.style.display = 'none';
      drop.style.display = 'none';
      binWrap.style.display = 'block';
      btnReset.style.display = 'inline-block';
      binHint.style.display = 'inline';
      btnCompat.style.display = 'inline-block';
      btnCompat.textContent = '전용 렌더러';
      binInstance = new window.HWPLIB.Viewer(binViewer, binaryStr, { type: 'binary' });
      busy = false;
      setLoading(false);
      setTimeout(function () {
        try {
          var faces = window.HWPX.rewriteFonts(binViewer);
          var missing = [];
          if (document.fonts && document.fonts.check) {
            faces.forEach(function (f) { if (!document.fonts.check('12px "' + f + '"')) missing.push(f); });
          }
          if (missing.length) {
            showBadge('호환 모드 · 글꼴 ' + missing.length + '종 대체');
            badge.title = '미설치 글꼴: ' + missing.join(', ');
          } else { showBadge('호환 모드(hwp.js)'); badge.title = ''; }
        } catch (e) { showBadge('호환 모드(hwp.js)'); }
      }, 50);
    } catch (e) {
      console.error(e);
      if (revertOnFail) {
        binWrap.style.display = 'none'; binHint.style.display = 'none';
        try {
          hxPage.innerHTML = '';
          var info = window.HWPBIN.render(binaryStr, hxPage, document);
          showPaged(info, 'HWP 5.0 · 전용 렌더러 (호환 모드 사용 불가)');
          btnCompat.style.display = 'inline-block';
          btnCompat.textContent = '호환 모드';
          return;
        } catch (e2) {}
      }
      fail('HWP 렌더링 실패: ' + (e.message || '알 수 없는 오류'),
        '가능한 원인:<br>1. 망간 전송 중 파일 손상<br>2. 비표준 저장 파일');
    }
  }

  function toggleRenderer() {
    if (!currentBinary) return;
    var toLegacy = hxScroll.style.display === 'block';
    if (binInstance) { try { binInstance.distory(); } catch (e) {} binInstance = null; }
    binViewer.innerHTML = ''; hxPage.innerHTML = '';
    binWrap.style.display = 'none'; hxScroll.style.display = 'none'; binHint.style.display = 'none';
    if (toLegacy) openLegacy(currentBinary, true);
    else {
      try {
        var info = window.HWPBIN.render(currentBinary, hxPage, document);
        showPaged(info, 'HWP 5.0 · 전용 렌더러');
        btnCompat.style.display = 'inline-block';
        btnCompat.textContent = '호환 모드';
        binHint.style.display = 'none';
      } catch (e) { openLegacy(currentBinary); }
    }
  }

  function fitWidth() {
    if (!pagePxWidth) return;
    var avail = hxScroll.clientWidth - 32;
    setZoom(avail / pagePxWidth);
  }

  function handleFiles(list) {
    var docs = [], fonts = [];
    for (var i = 0; i < list.length; i++) {
      if (/\.(ttf|otf|ttc)$/i.test(list[i].name)) fonts.push(list[i]);
      else docs.push(list[i]);
    }
    var chain = Promise.resolve();
    fonts.forEach(function (f) {
      chain = chain.then(function () {
        return f.arrayBuffer().then(function (buf) {
          var name = f.name.replace(/\.(ttf|otf|ttc)$/i, '').trim();
          return registerFont(name, buf, true).then(function () {
            if (!docs.length) { fname.textContent = '글꼴 등록됨: ' + name; }
          }).catch(function (e) { fail('글꼴 등록 실패: ' + f.name, e.message); });
        });
      });
    });
    chain.then(function () { if (docs.length) openFile(docs[0]); });
  }

  function setLoading(on, msg) {
    var el = $('loading');
    if (msg) $('loadmsg').textContent = msg;
    el.classList.toggle('on', !!on);
  }

  // 외부 스크립트(바로 열기)용 진입점: base64로 심어진 문서를 그대로 연다
  window.__hxBootstrap = function (name) {
    try {
      var node = document.getElementById('hxdata');
      if (!node) return;
      var b64 = (node.textContent || '')
        .split(/\r?\n/)
        .filter(function (l) { return l.indexOf('-----') === -1; })   // certutil의 BEGIN/END CERTIFICATE 줄 제거
        .join('')
        .replace(/[^A-Za-z0-9+/=]/g, '');
      var bin = atob(b64);
      var u8 = new Uint8Array(bin.length);
      for (var i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
      node.textContent = '';                       // 메모리 회수
      var f = new File([u8], name || 'document.hwp');
      openFile(f);
    } catch (e) {
      try { fail('바로 열기 실패', e.message); } catch (e2) {}
    }
  };

  // 복사 정규화: 화면은 원본 줄 그대로 그리지만, 복사는 문단 단위로 이어붙인다
  // (줄마다 <div>라서 그냥 복사하면 문장 중간에 줄바꿈이 끼어듦)
  function serializeNode(node) {
    if (node.nodeType === 3) return node.nodeValue;
    if (node.nodeType !== 1) return '';
    var tag = node.tagName, out = '';
    if (tag === 'BR') return '\n';
    for (var i = 0; i < node.childNodes.length; i++) out += serializeNode(node.childNodes[i]);
    if (node.classList && node.classList.contains('hx-seg')) return out + '\n';   // 문단 = 줄들을 이어붙임
    if (tag === 'TD' || tag === 'TH') return out + '\t';
    if (tag === 'TR') return out.replace(/\t$/, '') + '\n';
    if (tag === 'TABLE' || tag === 'P') return out + '\n';
    return out;
  }
  document.addEventListener('copy', function (e) {
    try {
      var sel = window.getSelection();
      if (!sel || sel.isCollapsed || !sel.rangeCount) return;
      if (!hxPage.contains(sel.anchorNode) && !hxPage.contains(sel.focusNode)) return;   // 뷰어 밖은 기본 동작
      var frag = sel.getRangeAt(0).cloneContents();
      var wrap = document.createElement('div');
      wrap.appendChild(frag);
      var text = serializeNode(wrap)
        .replace(/[ \t]+\n/g, '\n')
        .replace(/\n{3,}/g, '\n\n')
        .trim();
      if (!text) return;
      e.clipboardData.setData('text/plain', text);
      e.preventDefault();
    } catch (err) { /* 실패 시 브라우저 기본 복사 */ }
  });

  function openFile(file) {
    if (!file) return;
    busy = true;
    reset();
    setLoading(true, '문서 읽는 중… (' + (file.size / 1024).toFixed(0) + ' KB)');
    fname.textContent = file.name + ' (' + (file.size / 1024).toFixed(0) + ' KB)';
    var r = new FileReader();
    r.onload = function (ev) {
      var u8 = new Uint8Array(ev.target.result);
      if (u8.length < 8) return fail('파일이 비어있거나 너무 작음', '');
      // 매직바이트 판별
      if (isFontFile(file.name, u8)) {
        var fn = file.name.replace(/\.[a-zA-Z0-9]+$/, '').trim();
        registerFont(fn, ev.target.result, true).then(function () {
          fname.textContent = '글꼴 등록됨: ' + fn;
          drop.style.display = 'flex';
        }).catch(function (e) { fail('글꼴 등록 실패', e.message); });
        return;
      }
      if (u8[0] === 0x50 && u8[1] === 0x4B) {           // PK → zip → HWPX
        openHWPX(u8);
      } else if (u8[0] === 0xD0 && u8[1] === 0xCF) {    // CFB → HWP 5.0
        var s = '', CH = 0x8000;
        for (var i = 0; i < u8.length; i += CH) s += String.fromCharCode.apply(null, u8.subarray(i, i + CH));
        openBinary(s);
      } else {
        var head = '';
        for (var j = 0; j < Math.min(24, u8.length); j++) head += String.fromCharCode(u8[j]);
        if (/^HWP Document File/.test(head)) {
          fail('HWP 3.x (구버전) 파일 — 미지원', '한글에서 다시 저장(HWP 5.0 또는 HWPX)한 파일 필요');
        } else {
          var hex = Array.prototype.slice.call(u8, 0, 4).map(function (b) { return b.toString(16).padStart(2, '0'); }).join(' ');
          fail('알 수 없는 파일 형식 (시그니처: ' + hex + ')', '망간 전송 손상 또는 HWP/HWPX가 아닌 파일');
        }
      }
    };
    r.onerror = function () { fail('파일 읽기 실패', ''); };
    r.readAsArrayBuffer(file);
  }

  $('btnOpen').addEventListener('click', function () { fileInput.click(); });
  drop.addEventListener('click', function () { fileInput.click(); });
  btnReset.addEventListener('click', reset);
  btnPdf.addEventListener('click', function () {
    // 글꼴 로딩·줄 맞춤이 끝난 뒤 인쇄 (직후 클릭 시 쪽 나눔이 어긋나는 것 방지)
    var go = function () { scheduleFit(); setTimeout(function () { window.print(); }, 120); };
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(go).catch(go);
    else go();
  });
  btnCompat.addEventListener('click', toggleRenderer);
  $('zIn').addEventListener('click', function () { zoomMode = 'pct'; fitMode = false; setZoom(zoom + 0.1); saveZoom(); });
  $('zOut').addEventListener('click', function () { zoomMode = 'pct'; fitMode = false; setZoom(zoom - 0.1); saveZoom(); });
  $('zoomSel').addEventListener('change', function () {
    var v = this.value;
    if (v === 'fitw' || v === 'fitp') zoomMode = v;
    else if (v !== 'custom') { zoomMode = 'pct'; zoom = parseFloat(v); }
    applyZoomMode();
  });
  hxScroll.addEventListener('wheel', function (e) {           // Ctrl+휠 = 배율
    if (!e.ctrlKey) return;
    e.preventDefault();
    zoomMode = 'pct'; fitMode = false;
    setZoom(zoom * (e.deltaY < 0 ? 1.06 : 1 / 1.06));
    saveZoom();
  }, { passive: false });
  window.addEventListener('keydown', function (e) {           // Ctrl +/−/0
    if (!e.ctrlKey || hxScroll.style.display !== 'block') return;
    if (e.key === '+' || e.key === '=') { e.preventDefault(); zoomMode = 'pct'; fitMode = false; setZoom(zoom + 0.1); saveZoom(); }
    else if (e.key === '-') { e.preventDefault(); zoomMode = 'pct'; fitMode = false; setZoom(zoom - 0.1); saveZoom(); }
    else if (e.key === '0') { e.preventDefault(); zoomMode = 'fitw'; applyZoomMode(); }
  });
  var rzT = null;
  window.addEventListener('resize', function () {
    if (!fitMode || hxScroll.style.display !== 'block') return;
    clearTimeout(rzT); rzT = setTimeout(fitWidth, 120);
  });
  fileInput.addEventListener('change', function () { handleFiles(fileInput.files); fileInput.value = ''; });

  ['dragenter', 'dragover'].forEach(function (t) {
    document.addEventListener(t, function (e) { e.preventDefault(); drop.classList.add('over'); });
  });
  ['dragleave', 'drop'].forEach(function (t) {
    document.addEventListener(t, function (e) { e.preventDefault(); drop.classList.remove('over'); });
  });
  document.addEventListener('drop', function (e) {
    e.preventDefault();
    if (e.dataTransfer.files.length) handleFiles(e.dataTransfer.files);
  });
})();
</script>
</body>
